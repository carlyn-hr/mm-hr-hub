function polSearch(v){const q=state.query.trim().toLowerCase();const list=POLICIES.filter(p=>p.name.toLowerCase().includes(q)||(p.summary||"").toLowerCase().includes(q)||p.category.toLowerCase().includes(q)||p.tags.some(x=>x.toLowerCase().includes(q))||pName(p).toLowerCase().includes(q)||(pSum(p)||"").toLowerCase().includes(q)||catName(p.category).toLowerCase().includes(q));v.innerHTML=pageHead(t("Search"),`${t("Results for")} “${esc(state.query.trim())}”`,`${list.length} ${list.length===1?t('match'):t('matches')}.`)+(list.length?`<div class="policy-grid">${list.map(polCard).join("")}</div>`:`<div class="card empty"><i class="ti ti-search-off"></i><p>${t("No matches.")}</p></div>`);polBind();}
function polCard(p){const i=POLICIES.indexOf(p);return `<button class="policy-card" data-i="${i}" onclick="polPanel(${i})" style="--cat:${p._color}">
  <span class="pc-cat">${esc(catName(p.category))}</span><div class="pc-name">${esc(pName(p))}</div>
  <div class="pc-sum">${esc(pSum(p)||t("Open to read the full policy."))}</div></button>`;}
function polBind(){document.querySelectorAll(".policy-card").forEach(b=>b.onclick=()=>polPanel(+b.dataset.i));}
function polPanel(i){
  const p=POLICIES[i];if(!p)return;const c=CATS.find(c=>c.name===p.category);
  $("#pCat").innerHTML=`<span class="team-dot" style="background:${p._color}"></span><span style="color:${p._color}">${esc(catName(p.category))}</span>`;
  $("#pTitle").textContent=pName(p);
  $("#pBadges").innerHTML=(p.required?`<span class="badge req"><i class="ti ti-pin"></i>${t("Required")}</span>`:`<span class="badge active"><i class="ti ti-circle-check"></i>${t("Active")}</span>`);
  let meta="";if(p.owner)meta+=`<div class="meta-item"><i class="ti ti-user"></i><span class="k">Owner</span><span class="v">${esc(p.owner)}</span></div>`;
  if(p.updated)meta+=`<div class="meta-item"><i class="ti ti-calendar"></i><span class="k">Updated</span><span class="v">${esc(p.updated)}</span></div>`;
  if(p.tags.length)meta+=`<div class="meta-item"><i class="ti ti-tags"></i><span class="k">Tags</span><span class="v">${p.tags.map(t=>`<span class="tag">${esc(t)}</span>`).join("")}</span></div>`;
  const sibs=c?c.items.filter(x=>x!==p):[];
  let sub="";if(sibs.length)sub=`<div class="sub-head">${t("More in")} ${esc(catName(p.category))}</div>`+sibs.map(s=>{const si=POLICIES.indexOf(s);return `<button class="sub-item" onclick="polPanel(${si})"><span class="sub-dot" style="background:${s._color}"></span><span class="sub-name">${esc(pName(s))}<small>${esc(pSum(s)||"")}</small></span><i class="ti ti-chevron-right" style="color:var(--faint)"></i></button>`;}).join("");
  const _pb=pBody(p);const bodyHtml = _pb ? `<div class="policy-body">${_pb}</div>` : `<p class="panel-sum">${esc(pSum(p)||t("Open the full policy to read more."))}</p>`;
  $("#pBody").innerHTML=`${bodyHtml}${meta?`<div class="meta-list">${meta}</div>`:""}${sub}`;
  $("#pFoot").innerHTML = p.link ? `<a class="btn btn-primary" style="width:100%" href="${esc(p.link)}" target="_blank" rel="noopener"><i class="ti ti-external-link"></i> ${t("Open full document")}</a><div class="foot-note">${t("Opens in a new tab")}</div>` : (p.body ? `<div class="foot-note">${t("This is the full policy text.")}</div>` : `<button class="btn btn-primary" style="width:100%;background:var(--border-strong)" disabled><i class="ti ti-file-off"></i> No document linked</button><div class="foot-note">Add a Link in the policy sheet to enable this</div>`);
  $("#panel").classList.add("open");$("#panelScrim").classList.add("open");$("#pBody").scrollTop=0;
}
function closePanel(){$("#panel").classList.remove("open");$("#panelScrim").classList.remove("open");}
$("#searchInput").addEventListener("input",e=>{state.query=e.target.value;if(state.module==="policies")renderPolicies();});

    <span class="form-ic">${d.emoji}</span>

/* ============================================================ LEAVE ============================================================ */
function renderLeave(){ state.isAdmin ? leaveAdmin() : leaveMe(); }
function leaveMe(){
  const me=emp(state.meId);
  const opts=EMP.map(e=>`<option value="${e.id}" ${e.id===state.meId?"selected":""}>${esc(e.name)} · ${esc(CONFIG.teams[e.team]?.label||e.team)}</option>`).join("");
  let html=pageHead(t("Time off"),t("Request time off"),t("Submit a request and track its status. Approved days are deducted from your balance automatically."))+
    `<div class="who"><label>${t("I am")}</label><select class="who-select" onchange="state.meId=this.value;renderLeave()">${opts}</select>${me?teamChip(me.team):""}<button class="linkbtn" onclick="toggleAdmin()" style="margin-left:auto"><i class="ti ti-checklist"></i> ${t("Manager view")}</button></div>`;
  if(!me){$("#view").innerHTML=html+`<div class="card empty"><i class="ti ti-users"></i><p>No people yet. Sign in as admin to add your team.</p></div>`;return;}
  const types=CONFIG.teams[me.team]?.leaveTypes||Object.keys(me.balances);
  const bals=types.filter(ty=>!UNPAID(ty)).map(ty=>{const v=me.balances[ty]??0;return `<div class="bal ${v<0?'neg':''}"><div class="n">${v}<small> ${t("hours")}</small></div><div class="t">${esc(ty)}</div></div>`;}).join("");
  const mine=REQ.filter(r=>r.employee_id===me.id);
  html+=`<div class="grid2"><div>
    <div class="card" style="margin-bottom:20px"><div class="section-label">${t("My balances")}</div><div class="bal-grid">${bals||'<p style="font-size:13px;color:var(--sub)">No tracked balances.</p>'}</div></div>
    <div class="card"><div class="section-label">${t("New request")}</div>
      <div class="field"><label>${t("Leave type")}</label><select class="f-input" id="rType" onchange="lvCalc()">${types.map(t=>`<option>${esc(t)}</option>`).join("")}</select></div>
      <div class="row"><div class="field"><label>${t("Start date")}</label><input class="f-input" id="rStart" type="date" onchange="lvSync();lvCalc()"/></div><div class="field"><label>${t("End date")}</label><input class="f-input" id="rEnd" type="date" onchange="lvCalc()"/></div></div>
      <div class="field"><label class="check"><input type="checkbox" id="rHalf" onchange="lvCalc()"/> ${t("Half day (single day only)")}</label></div>
      <div class="field"><label>${t("Reason (optional)")}</label><textarea class="f-input" id="rReason" placeholder="${t("A short note for your manager")}"></textarea></div>
      <div class="calc-note" id="calcNote"><i class="ti ti-calculator"></i><span>${t("Pick dates to see working days.")}</span></div>
      <div style="margin-top:16px"><button class="btn btn-primary" id="subBtn" onclick="lvSubmit()"><i class="ti ti-send"></i> ${t("Submit request")}</button></div></div>
    </div>
    <div class="card"><div class="section-label">${t("My requests")}</div>${mine.length?mine.map(r=>lvCard(r,true)).join(""):`<div class="empty"><i class="ti ti-calendar-off"></i><p>No requests yet.</p></div>`}</div></div>`;
  $("#view").innerHTML=html;
  const today=new Date().toISOString().slice(0,10);$("#rStart").min=today;$("#rEnd").min=today;lvCalc();
}
function lvSync(){const s=$("#rStart").value,e=$("#rEnd");if(s&&(!e.value||e.value<s))e.value=s;e.min=s||new Date().toISOString().slice(0,10);}
function lvDays(){const s=$("#rStart").value,e=$("#rEnd").value,h=$("#rHalf").checked;if(!s||!e)return 0;if(h&&s===e)return .5;return businessDays(s,e);}
function lvCalc(){const me=emp(state.meId);if(!me)return;const type=$("#rType").value,d=lvDays();$("#rHalf").disabled=!($("#rStart").value&&$("#rStart").value===$("#rEnd").value);const n=$("#calcNote");if(!d){n.innerHTML=`<i class="ti ti-calculator"></i><span>${t("Pick dates to see working days.")}</span>`;$("#subBtn").disabled=true;return;}$("#subBtn").disabled=false;if(UNPAID(type)){n.innerHTML=`<i class="ti ti-calculator"></i><span><b>${d}</b> day${d===1?"":"s"} unpaid. No balance deducted.</span>`;return;}const bal=me.balances[type]??0,hrs=d*HOURS_PER_DAY,after=bal-hrs;n.innerHTML=`<i class="ti ti-calculator"></i><span><b>${d}</b> working day${d===1?"":"s"} (<b>${hrs}</b> h). Balance ${bal} → <b style="color:${after<0?'var(--bad)':'var(--text)'}">${after}</b> h${after<0?" (over balance)":""}</span>`;}
function notifyRequest(r){
  if(!CONFIG.notifyWebhook||!(CONFIG.notifyEmails&&CONFIG.notifyEmails.length))return;
  try{ fetch(CONFIG.notifyWebhook,{method:"POST",mode:"no-cors",headers:{"Content-Type":"text/plain;charset=utf-8"},body:JSON.stringify({to:CONFIG.notifyEmails,company:CONFIG.companyName,name:r.employee_name,team:r.team,type:r.type,start:r.start_date,end:r.end_date,days:r.days,reason:r.reason})}); }catch(e){ console.error("notify failed",e); }
}
async function lvSubmit(){const me=emp(state.meId);if(!me)return;const s=$("#rStart").value,e=$("#rEnd").value;if(!s||!e){toast("Pick dates");return;}const d=lvDays();if(!d){toast("No working days in range");return;}const r={employee_id:me.id,employee_name:me.name,team:me.team,type:$("#rType").value,start_date:s,end_date:e,half_day:$("#rHalf").checked&&s===e,days:d,reason:$("#rReason").value.trim(),status:"pending",created_at:new Date().toISOString()};$("#subBtn").disabled=true;try{await DB.addRequest(r);await refresh();notifyRequest(r);toast("Request submitted");renderLeave();}catch(err){toast("Could not submit");$("#subBtn").disabled=false;}}
function lvCard(r,self){const half=r.half_day?" · half day":"";const range=r.start_date===r.end_date?fmtDate(r.start_date):`${fmtDate(r.start_date)} → ${fmtDate(r.end_date)}`;const act=(self&&r.status==="pending")?`<button class="btn btn-ghost btn-sm" onclick="lvCancel('${r.id}')"><i class="ti ti-x"></i> Cancel</button>`:"";return `<div class="req"><div class="req-top"><div><div class="req-type">${esc(r.type)}</div><div class="req-dates"><i class="ti ti-calendar"></i>${range}${half}</div></div><span class="days-tag">${r.days} day${r.days==1?"":"s"}</span></div>${r.reason?`<div class="req-reason">${esc(r.reason)}</div>`:""}<div class="req-foot">${badge(r.status)} ${act}</div></div>`;}
async function lvCancel(id){try{await DB.deleteRequest(id);await refresh();toast("Cancelled");renderLeave();}catch(e){toast("Could not cancel");}}

function leaveAdmin(){
  const counts={pending:REQ.filter(r=>r.status==="pending").length};
  const f=state.leaveFilter;
  let body;
  if(f==="people"){body=peoplePanel();}
  else{const list=REQ.filter(r=>f==="all"?true:r.status===f);body=list.length?`<div class="card">${list.map(lvAdminCard).join("")}</div>`:`<div class="card empty"><i class="ti ti-inbox"></i><p>Nothing here.</p></div>`;}
  $("#view").innerHTML=pageHead("Leave · Manager","Leave requests","Approving deducts the days from that person's balance automatically.")+
    `<div class="filterbar">
      <button class="fbtn ${f==='pending'?'active':''}" onclick="state.leaveFilter='pending';renderLeave()">Pending${counts.pending?` (${counts.pending})`:""}</button>
      <button class="fbtn ${f==='approved'?'active':''}" onclick="state.leaveFilter='approved';renderLeave()">Approved</button>
      <button class="fbtn ${f==='rejected'?'active':''}" onclick="state.leaveFilter='rejected';renderLeave()">Declined</button>
      <button class="fbtn ${f==='all'?'active':''}" onclick="state.leaveFilter='all';renderLeave()">All</button>
      <button class="fbtn ${f==='people'?'active':''}" onclick="state.leaveFilter='people';renderLeave()" style="margin-left:auto"><i class="ti ti-users"></i> People</button>
    </div>${body}`;
}
function lvAdminCard(r){const e=emp(r.employee_id);const half=r.half_day?" · half day":"";const range=r.start_date===r.end_date?fmtDate(r.start_date):`${fmtDate(r.start_date)} → ${fmtDate(r.end_date)}`;let impact="";if(e&&!UNPAID(r.type)){const bal=e.balances[r.type]??0;impact=`<span class="mini-bal">${esc(r.type)}: ${bal} → ${bal-r.days*HOURS_PER_DAY} h</span>`;}else if(UNPAID(r.type))impact=`<span class="mini-bal">Unpaid · no deduction</span>`;let act="";if(r.status==="pending")act=`<button class="btn btn-ok btn-sm" onclick="lvDecide('${r.id}','approved')"><i class="ti ti-check"></i> Approve</button><button class="btn btn-bad btn-sm" onclick="lvDecide('${r.id}','rejected')"><i class="ti ti-x"></i> Decline</button>`;else if(r.status==="approved")act=`<button class="btn btn-ghost btn-sm" onclick="lvRevoke('${r.id}')"><i class="ti ti-arrow-back-up"></i> Revoke</button>`;return `<div class="req"><div class="req-top"><div style="display:flex;gap:11px;align-items:flex-start"><div class="avatar" style="background:${avatarColor(r.team)}">${initials(r.employee_name)}</div><div><div class="req-type">${esc(r.employee_name)} ${teamChip(r.team)}</div><div class="req-dates"><b style="color:var(--text)">${esc(r.type)}</b> · ${range}${half}</div></div></div><span class="days-tag">${r.days} day${r.days==1?"":"s"}</span></div>${r.reason?`<div class="req-reason">“${esc(r.reason)}”</div>`:""}<div class="req-foot">${badge(r.status)} ${impact}<span style="flex:1"></span>${act}</div></div>`;}
async function lvDecide(id,status){const r=REQ.find(x=>x.id===id);if(!r)return;try{if(status==="approved"&&!UNPAID(r.type)){const e=emp(r.employee_id);if(e){const b={...e.balances};b[r.type]=(b[r.type]??0)-r.days*HOURS_PER_DAY;await DB.updateBalances(e.id,b);}}await DB.setRequestStatus(id,status,"Admin");await refresh();toast(status==="approved"?"Approved · balance updated":"Declined");renderLeave();}catch(e){toast("Action failed");}}
async function lvRevoke(id){const r=REQ.find(x=>x.id===id);if(!r)return;try{if(!UNPAID(r.type)){const e=emp(r.employee_id);if(e){const b={...e.balances};b[r.type]=(b[r.type]??0)+r.days*HOURS_PER_DAY;await DB.updateBalances(e.id,b);}}await DB.setRequestStatus(id,"rejected","Admin (revoked)");await refresh();toast("Revoked · balance restored");renderLeave();}catch(e){toast("Could not revoke");}}

function peoplePanel(){
  const block=t=>{
    const T=CONFIG.teams[t];const list=EMP.filter(e=>e.team===t);
    const rows=list.length?list.map(e=>{
      const bals=Object.entries(e.balances).filter(([k])=>!UNPAID(k)).map(([k,v])=>`<span class="mini-bal">${esc(k)}: ${v}</span>`).join("");
      const rm=state.isSuper?`<button class="linkbtn" style="color:var(--bad)" onclick="removeEmployee('${e.id}')">Remove</button>`:"";
      return `<div class="people-row"><div class="avatar" style="background:${avatarColor(t)}">${initials(e.name)}</div><div><div class="people-name">${esc(e.name)}</div><div class="people-sub">${esc(e.email||T.kind)}</div></div><div class="people-bal">${bals||'<span class="people-sub">no balances</span>'}<button class="linkbtn" onclick="editBalances('${e.id}')">Edit</button>${rm}</div></div>`;
    }).join(""):`<div class="people-sub" style="padding:12px 0">No one on this team yet.</div>`;
    const add=state.isSuper?`<button class="btn btn-ghost btn-sm" style="margin-left:auto" onclick="addPersonModal('${t}')"><i class="ti ti-plus"></i> Add person</button>`:"";
    return `<div class="card" style="margin-bottom:18px"><div class="section-label" style="display:flex;align-items:center;gap:8px;margin-bottom:14px">${teamChip(t)} <span style="color:var(--faint)">· ${esc(T.kind)}</span>${add}</div>${rows}</div>`;
  };
  const note=state.isSuper?"":`<p style="font-size:12px;color:var(--faint);margin-bottom:14px">You can edit balances. Adding or removing people needs a super-admin sign-in.</p>`;
  return note+Object.keys(CONFIG.teams).map(block).join("");
}
async function removeEmployee(id){ const e=emp(id); if(!e)return; $("#modalBox").innerHTML=`<h3>Remove ${esc(e.name)}?</h3><p style="font-size:13px;color:var(--sub);margin-bottom:16px">This takes the person out of the Hub so they no longer show in the clock or leave lists. Their past attendance and leave records stay in the database. Use this for staff who have left.</p><div class="modal-foot"><button class="btn btn-ghost" onclick="closeModal()">Cancel</button><button class="btn btn-bad" onclick="confirmRemove('${id}')"><i class="ti ti-trash"></i> Remove</button></div>`; openModal(); }
async function confirmRemove(id){ try{ await DB.deactivateEmployee(id); await refresh(); if(state.meId&&!emp(state.meId))state.meId=EMP[0]?.id||null; if(state.clockId&&!emp(state.clockId))state.clockId=EMP[0]?.id||null; closeModal(); toast("Person removed"); renderLeave(); }catch(e){ toast("Could not remove"); } }
function addPersonModal(team){const T=CONFIG.teams[team];const fields=T.leaveTypes.filter(t=>!UNPAID(t)).map(t=>`<div class="field" style="margin-bottom:10px"><label>${esc(t)} (hours)</label><input class="f-input" data-bal="${esc(t)}" type="number" value="0" min="0" step="0.5"/></div>`).join("");$("#modalBox").innerHTML=`<h3>Add person · ${esc(T.label)}</h3><div class="field"><label>Full name</label><input class="f-input" id="npName" placeholder="e.g. Maria Santos"/></div><div class="field"><label>Email (optional)</label><input class="f-input" id="npEmail" type="email"/></div><div class="section-label" style="margin-top:6px">Starting balances</div>${fields}<div class="modal-foot"><button class="btn btn-ghost" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="savePerson('${team}')"><i class="ti ti-user-plus"></i> Add</button></div>`;openModal();}
async function savePerson(team){const name=$("#npName").value.trim();if(!name){$("#npName").style.borderColor="var(--bad)";return;}const balances={};document.querySelectorAll("#modalBox [data-bal]").forEach(i=>balances[i.dataset.bal]=parseFloat(i.value)||0);CONFIG.teams[team].leaveTypes.forEach(t=>{if(UNPAID(t))balances[t]=0;});try{await DB.addEmployee({name,team,email:$("#npEmail").value.trim(),active:true,balances});await refresh();closeModal();toast("Person added");renderLeave();}catch(e){toast("Could not add");}}
function editBalances(id){const e=emp(id);if(!e)return;const fields=Object.entries(e.balances).filter(([k])=>!UNPAID(k)).map(([k,v])=>`<div class="field" style="margin-bottom:10px"><label>${esc(k)} (hours)</label><input class="f-input" data-bal="${esc(k)}" type="number" value="${v}" step="0.5"/></div>`).join("");$("#modalBox").innerHTML=`<h3>Edit balances · ${esc(e.name)}</h3>${fields||'<p style="font-size:13px;color:var(--sub)">No tracked balances.</p>'}<div class="modal-foot"><button class="btn btn-ghost" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="saveBalances('${id}')"><i class="ti ti-device-floppy"></i> Save</button></div>`;openModal();}
async function saveBalances(id){const e=emp(id);if(!e)return;const b={...e.balances};document.querySelectorAll("#modalBox [data-bal]").forEach(i=>b[i.dataset.bal]=parseFloat(i.value)||0);try{await DB.updateBalances(id,b);await refresh();closeModal();toast("Balances updated");renderLeave();}catch(e){toast("Could not save");}}

/* ============================================================ ATTENDANCE ============================================================ */
function renderAttendance(){ (state.isAdmin && state.atView==="admin") ? atAdmin() : atClock(); }

function atClock(){
  const teamKey = state.clockLoc==="remote" ? "ph" : "ca";
  const list = EMP.filter(e=>e.team===teamKey);
  let me = emp(state.clockId);
  if(!me || me.team!==teamKey){ me = list[0]; state.clockId = me ? me.id : null; }
  const seg = `<div class="loc-seg">
    <button class="loc-btn ${state.clockLoc!=="remote"?"on":""}" onclick="setClockLoc('field')"><i class="ti ti-map-pin"></i> ${t("Onsite / Field")}</button>
    <button class="loc-btn ${state.clockLoc==="remote"?"on":""}" onclick="setClockLoc('remote')"><i class="ti ti-home"></i> ${t("Remote")}</button>
  </div>`;
  const head = `<div class="eyebrow" style="text-align:center">${esc(CONFIG.companyName)} · ${t("Time clock")}</div>
    <div class="clock-time serif" id="liveClock">--:--</div>
    <div class="clock-date" id="liveDate"></div>`;
  if(!me){
    $("#view").innerHTML=`<div class="clock-screen">${head}<div class="clock-card">${seg}<div class="empty" style="margin-top:8px"><i class="ti ti-users"></i><p>${state.clockLoc==="remote"?t("No remote team set up yet."):t("No onsite crew set up yet.")}</p></div></div></div>`;
    tickClock(); clockTimer=setInterval(tickClock,1000); return;
  }
  const remote = state.clockLoc==="remote";
  const open=ATT.find(a=>a.employee_id===me.id&&!a.clock_out);
  const opts=list.map(e=>`<option value="${e.id}" ${e.id===me.id?"selected":""}>${esc(e.name)}</option>`).join("");
  const siteSel = CONFIG.sites&&CONFIG.sites.length
    ? `<select class="f-input" id="clockSite">${CONFIG.sites.map(s=>`<option>${esc(s)}</option>`).join("")}</select>`
    : `<input class="f-input" id="clockSite" placeholder="${t("Site or location (optional)")}"/>`;
  let status,btn;
  if(open){
    const kl={office:t("In the office"),travel:t("On travel"),work:t("Working onsite"),remote:t("Working remotely")}[open.kind]||t("Clocked in");
    const siteTxt=(open.site&&open.site!=="Remote")?` · ${esc(open.site)}`:"";
    status=`<div class="status-line"><span class="status-in">● ${kl}</span> ${t("since")} <b>${fmtTime(open.clock_in)}</b>${siteTxt}</div>`;
    const outLbl={travel:t("End travel"),office:t("Clock out of office")}[open.kind]||t("Clock out");
    btn=`<button class="big-btn big-out" onclick="atClockOut('${open.id}')"><i class="ti ti-logout-2"></i> ${outLbl}</button>`;
  }else{
    status=`<div class="status-line">${t("Not clocked in. Tap below to start your shift.")}</div>`;
    btn=`<button class="big-btn big-in" onclick="atDoClockIn('${me.id}')"><i class="ti ti-login-2"></i> ${t("Clock in")}</button>`;
  }
  const back = state.isAdmin ? `<button class="linkbtn" onclick="goModule('attendance')" style="margin-top:18px"><i class="ti ti-chart-bar"></i> Timekeeping</button>` : "";
  let breakUI="";
  if(open){
    const bks=Array.isArray(open.breaks)?open.breaks:[];
    const active=bks.filter(b=>!b.end).pop();
    if(active){
      breakUI=`<div class="brk-active"><span class="status-brk">\u25CF ${active.kind==="meal"?t("On meal break"):t("On rest break")}</span> ${t("since")} <b>${fmtTime(active.start)}</b></div><button class="brk-btn brk-end" onclick="atEndBreak('${open.id}')"><i class="ti ti-player-stop"></i> ${t("End break")}</button>`;
    } else {
      breakUI=`<div class="brk-row"><button class="brk-btn" onclick="atStartBreak('${open.id}','rest')"><i class="ti ti-coffee"></i> ${t("Rest break")}<small>${t("10 min, paid")}</small></button><button class="brk-btn" onclick="atStartBreak('${open.id}','meal')"><i class="ti ti-tools-kitchen-2"></i> ${t("Meal break")}<small>${t("30 min, unpaid")}</small></button></div>`;
    }
  }
  const typeField = `<div class="site-field" style="margin-top:12px"><label style="font-size:12px;font-weight:600;color:var(--sub);display:block;margin-bottom:6px">${t("Type")}</label><select class="f-input" id="clockKind"><option value="office">${t("Office (in / out)")}</option><option value="travel">${t("Travel between sites")}</option><option value="work">${t("Work onsite / offsite")}</option></select></div>`;
  const siteField = `<div class="site-field" style="margin-top:12px"><label style="font-size:12px;font-weight:600;color:var(--sub);display:block;margin-bottom:6px">${t("Site or address")}</label>${siteSel}</div>`;
  const gpsNote = `<div style="font-size:11px;color:var(--faint);margin-top:12px;display:flex;align-items:center;gap:5px;justify-content:center;text-align:center"><i class="ti ti-map-pin"></i> ${t("Your location is recorded at clock-in so the office can confirm you are at the site.")}</div>`;
  const remoteNote = `<div style="font-size:11px;color:var(--faint);margin-top:12px;display:flex;align-items:center;gap:5px;justify-content:center;text-align:center"><i class="ti ti-home"></i> ${t("Remote clock-in. No location is recorded.")}</div>`;
  const openNowRows=(ATT||[]).filter(a=>!a.clock_out);
  const onField=new Set(openNowRows.filter(a=>a.team==="ca").map(a=>a.employee_id)).size, onRemote=new Set(openNowRows.filter(a=>a.team==="ph").map(a=>a.employee_id)).size;
  const summary=`<div class="clock-sum"><div class="cs-item"><div class="cs-n">${onField+onRemote}</div><div class="cs-l">${t("Clocked in")}</div></div><div class="cs-item"><div class="cs-n">${onField}</div><div class="cs-l">${t("In the field")}</div></div><div class="cs-item"><div class="cs-n">${onRemote}</div><div class="cs-l">${t("Remote")}</div></div></div>`;
  $("#view").innerHTML=`<div class="clock-screen">${head}
    <div class="clock-card">
      ${seg}
      ${summary}
      <div style="font-size:12.5px;color:var(--sub);font-weight:600;text-align:left;margin-bottom:6px">${t("Who's clocking in?")}</div>
      <select class="clock-who" onchange="state.clockId=this.value;renderAttendance()">${opts}</select>
      ${(open||remote)?"":typeField}
      ${(open||remote)?"":siteField}
      ${status}
      ${breakUI}
      ${btn}
      ${remote?remoteNote:gpsNote}
    </div>
    ${back}
  </div>`;
  tickClock();
  clockTimer=setInterval(tickClock,1000);
}
function setClockLoc(loc){ state.clockLoc=loc; const key=loc==="remote"?"ph":"ca"; const list=EMP.filter(e=>e.team===key); state.clockId=list[0]?list[0].id:null; renderAttendance(); }
function tickClock(){const el=$("#liveClock"),d=$("#liveDate");if(!el)return;const now=new Date();el.textContent=now.toLocaleTimeString(undefined,{hour:"numeric",minute:"2-digit"});if(d)d.textContent=now.toLocaleDateString(undefined,{weekday:"long",month:"long",day:"numeric"});}
async function atDoClockIn(empId){
  const e=emp(empId);if(!e)return;
  const dup=await DB.openEntry(e.id);
  if(dup){ toast(`${e.name.split(" ")[0]} is already clocked in`); await refresh(); renderAttendance(); return; }
  const remote = state.clockLoc==="remote";
  const siteEl=$("#clockSite");const site=remote?"Remote":(siteEl?siteEl.value.trim():"");
  const kindEl=$("#clockKind");const kind=remote?"remote":(kindEl?kindEl.value:"work");
  const rec={employee_id:e.id,employee_name:e.name,team:e.team,kind,clock_in:new Date().toISOString(),clock_out:null,hours:null,site,lat:null,lng:null};
  const verb={travel:"started travel",office:"clocked in at the office",work:"clocked in onsite",remote:"clocked in"}[kind]||"clocked in";
  const finish=async()=>{try{await DB.clockIn(rec);await refresh();toast(`${e.name.split(" ")[0]} ${verb}`);renderAttendance();}catch(err){toast("Clock-in failed");}};
  if(!remote && navigator.geolocation){navigator.geolocation.getCurrentPosition(p=>{rec.lat=+p.coords.latitude.toFixed(5);rec.lng=+p.coords.longitude.toFixed(5);finish();},()=>finish(),{timeout:8000,enableHighAccuracy:true});}
  else finish();
}
async function atClockOut(id){
  const a=ATT.find(x=>x.id===id);if(!a)return;
  const out=new Date().toISOString();
  const breaks=Array.isArray(a.breaks)?a.breaks.map(b=>({...b})):[];
  breaks.forEach(b=>{ if(!b.end) b.end=out; });
  let unpaid=0; breaks.forEach(b=>{ if(b.kind==="meal"&&b.start&&b.end) unpaid+=Math.max(0,new Date(b.end)-new Date(b.start)); });
  const hrs=Math.round((((new Date(out)-new Date(a.clock_in))-unpaid)/3600000)*100)/100;
  try{ await DB.clockOut(id,out,hrs); if(breaks.length) await DB.updateEntry(id,{breaks}); await refresh(); toast(`Clocked out \u00b7 ${hrs}h`); renderAttendance(); }catch(e){ toast("Clock-out failed"); }
}
async function atStartBreak(id,kind){
  const a=ATT.find(x=>x.id===id);if(!a)return;
  const breaks=Array.isArray(a.breaks)?a.breaks.map(b=>({...b})):[];
  if(breaks.some(b=>!b.end)){ toast(t("Already on break")); return; }
  breaks.push({kind,start:new Date().toISOString(),end:null});
  try{ await DB.updateEntry(id,{breaks}); await refresh(); toast(kind==="meal"?t("Meal break started"):t("Rest break started")); renderAttendance(); }catch(e){ toast("Failed"); }
}
async function atEndBreak(id){
  const a=ATT.find(x=>x.id===id);if(!a)return;
  const breaks=Array.isArray(a.breaks)?a.breaks.map(b=>({...b})):[];
  const open=breaks.filter(b=>!b.end).pop(); if(!open)return;
  open.end=new Date().toISOString();
  try{ await DB.updateEntry(id,{breaks}); await refresh(); toast(t("Break ended")); renderAttendance(); }catch(e){ toast("Failed"); }
}

/* ----- attendance admin ----- */
function atAdmin(){
  const openNow=ATT.filter(a=>!a.clock_out);
  const today=new Date().toISOString().slice(0,10);
  const todays=ATT.filter(a=>a.clock_in.slice(0,10)===today);
  if(!state.tsRange){const end=new Date();const start=new Date();start.setDate(start.getDate()-6);state.tsRange={start:start.toISOString().slice(0,10),end:end.toISOString().slice(0,10),team:"all"};}

  const liveHtml=openNow.length?`<div class="live-list">${openNow.map(a=>`<div class="live-row"><span class="pulse"></span><div class="avatar" style="width:30px;height:30px;font-size:11px;background:${avatarColor(a.team)}">${initials(a.employee_name)}</div><div><div style="font-size:13.5px;font-weight:600">${esc(a.employee_name)}</div><div style="font-size:12px;color:var(--faint)">${a.site?esc(a.site)+" · ":""}in at ${fmtTime(a.clock_in)}${mapLink(a)}</div></div><span class="since">${sinceText(a.clock_in)}</span></div>`).join("")}</div>`:`<div class="empty" style="padding:24px"><i class="ti ti-coffee"></i><p>Nobody clocked in right now.</p></div>`;

  $("#view").innerHTML=pageHead("Timekeeping","Time, attendance & payroll","Live status, today's activity, and a timesheet you can export for payroll, with a California overtime breakdown.")+
    `<div style="display:flex;gap:8px;margin-bottom:18px"><button class="linkbtn" onclick="goModule('clock')"><i class="ti ti-arrow-left"></i> Clock screen</button><button class="linkbtn" onclick="showQR()" style="margin-left:auto"><i class="ti ti-qrcode"></i> Clock-in QR</button></div>
    <div class="grid2" style="align-items:start">
      <div class="card"><div class="section-label">On the clock now (${openNow.length})</div>${liveHtml}</div>
      <div class="card"><div class="section-label">Today (${todays.length} entr${todays.length===1?'y':'ies'})</div>${todays.length?todays.map(atRow).join(""):`<div class="empty" style="padding:24px"><i class="ti ti-calendar"></i><p>No entries today yet.</p></div>`}</div>
    </div>
    <div class="card" style="margin-top:20px">
      <div class="section-label">Timesheets</div>
      <div class="daterow">
        <div class="field"><label>From</label><input class="f-input" type="date" id="tsStart" value="${state.tsRange.start}" onchange="state.tsRange.start=this.value;renderAttendance()"/></div>
        <div class="field"><label>To</label><input class="f-input" type="date" id="tsEnd" value="${state.tsRange.end}" onchange="state.tsRange.end=this.value;renderAttendance()"/></div>
        <div class="field"><label>Team</label><select class="f-input" id="tsTeam" onchange="state.tsRange.team=this.value;renderAttendance()"><option value="all" ${state.tsRange.team==='all'?'selected':''}>All</option><option value="ca" ${state.tsRange.team==='ca'?'selected':''}>California</option><option value="ph" ${state.tsRange.team==='ph'?'selected':''}>Philippines</option></select></div>
        <button class="btn btn-ghost" onclick="exportCSV()"><i class="ti ti-download"></i> Export CSV</button>
      </div>
      ${timesheetTable()}
      <p style="font-size:11.5px;color:var(--faint);margin-top:14px;line-height:1.5">Hours are split into Office (non-cleaning rate), Travel between sites, and Onsite cleaning, so payroll can apply the right rate to each. Overtime, double-time, the 7th-day rule, break premiums, and the actual pay rates are applied in payroll, not here. Use this as a reviewed timesheet to hand to payroll, not as the final paycheck.</p>
    </div>`;
}
function sinceText(iso){const m=Math.floor((Date.now()-new Date(iso))/60000);if(m<60)return m+"m";const h=Math.floor(m/60);return h+"h "+(m%60)+"m";}
function mapLink(a){ return (a.lat&&a.lng)?` · <a href="https://www.google.com/maps?q=${a.lat},${a.lng}" target="_blank" rel="noopener" style="color:var(--accent)">map</a>`:""; }
function atRow(a){const km={travel:"travel",office:"office",remote:"remote"};const tv=km[a.kind]?` · <span style="color:var(--warn)">${km[a.kind]}</span>`:"";return `<div class="req" style="padding:11px 13px;margin-bottom:9px"><div style="display:flex;align-items:center;gap:11px"><div class="avatar" style="width:30px;height:30px;font-size:11px;background:${avatarColor(a.team)}">${initials(a.employee_name)}</div><div style="flex:1"><div style="font-size:13.5px;font-weight:600">${esc(a.employee_name)}</div><div style="font-size:12px;color:var(--faint)">${fmtTime(a.clock_in)} ${a.clock_out?"→ "+fmtTime(a.clock_out):"→ ..."}${a.site?" · "+esc(a.site):""}${tv}${mapLink(a)}</div></div><span class="days-tag">${a.clock_out?a.hours+"h":'<span style="color:var(--ok)">active</span>'}</span></div></div>`;}

function timesheetData(){
  const {start,end,team}=state.tsRange;
  const rows=ATT.filter(a=>a.clock_out&&a.clock_in.slice(0,10)>=start&&a.clock_in.slice(0,10)<=end&&(team==="all"||a.team===team));
  const byEmp={};
  rows.forEach(a=>{ const k=a.employee_id; if(!byEmp[k])byEmp[k]={name:a.employee_name,team:a.team,days:new Set(),office:0,travel:0,onsite:0,remote:0};
    const h=a.hours||0; byEmp[k].days.add(a.clock_in.slice(0,10));
    if(a.kind==="travel")byEmp[k].travel+=h; else if(a.kind==="office")byEmp[k].office+=h; else if(a.kind==="remote")byEmp[k].remote+=h; else byEmp[k].onsite+=h; });
  return Object.values(byEmp).map(e=>({name:e.name,team:e.team,daysWorked:e.days.size,office:e.office,travel:e.travel,onsite:e.onsite,remote:e.remote,total:e.office+e.travel+e.onsite+e.remote})).sort((a,b)=>a.name.localeCompare(b.name));
}
function r1(n){return Math.round(n*100)/100;}
function timesheetTable(){
  const data=timesheetData();
  if(!data.length)return `<div class="empty" style="padding:30px"><i class="ti ti-table"></i><p>No completed shifts in this range.</p></div>`;
  const tot=data.reduce((t,d)=>{t.office+=d.office;t.travel+=d.travel;t.onsite+=d.onsite;t.remote+=d.remote;t.total+=d.total;return t;},{office:0,travel:0,onsite:0,remote:0,total:0});
  return `<div style="overflow-x:auto"><table class="ts-table"><thead><tr><th>Employee</th><th>Team</th><th class="num">Days</th><th class="num">Office</th><th class="num">Travel</th><th class="num">Onsite</th><th class="num">Remote</th><th class="num">Total</th></tr></thead><tbody>
    ${data.map(d=>`<tr><td>${esc(d.name)}</td><td>${teamChip(d.team)}</td><td class="num">${d.daysWorked}</td><td class="num">${r1(d.office)}</td><td class="num">${r1(d.travel)}</td><td class="num">${r1(d.onsite)}</td><td class="num">${r1(d.remote)}</td><td class="num"><b>${r1(d.total)}</b></td></tr>`).join("")}
  </tbody><tfoot><tr class="ts-foot"><td colspan="3">Total</td><td class="num">${r1(tot.office)}</td><td class="num">${r1(tot.travel)}</td><td class="num">${r1(tot.onsite)}</td><td class="num">${r1(tot.remote)}</td><td class="num">${r1(tot.total)}</td></tr></tfoot></table></div>`;
}
function exportCSV(){
  const data=timesheetData();
  const head=["Employee","Team","Days worked","Office hours","Travel hours","Onsite (cleaning) hours","Remote hours","Total hours"];
  const lines=[head.join(",")].concat(data.map(d=>[`"${d.name}"`,CONFIG.teams[d.team]?.label||d.team,d.daysWorked,r1(d.office),r1(d.travel),r1(d.onsite),r1(d.remote),r1(d.total)].join(",")));
  const blob=new Blob([lines.join("\n")],{type:"text/csv"});const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download=`timesheet_${state.tsRange.start}_to_${state.tsRange.end}.csv`;a.click();URL.revokeObjectURL(url);toast("Timesheet exported");
}
function showQR(){
  const url=location.origin+location.pathname+"#clock";
  let qrImg="";
  try{ if(window.qrcode){const qr=qrcode(0,"M");qr.addData(url);qr.make();qrImg=qr.createImgTag(6,8);} }catch(e){console.error(e);}
  $("#modalBox").innerHTML=`<h3>Clock-in QR code</h3>
    <div class="qr-wrap"><div class="qr-box">${qrImg||'<div style="width:170px;height:170px;display:flex;align-items:center;justify-content:center;color:var(--faint);font-size:12px">QR unavailable</div>'}</div>
      <div class="qr-info"><p>Workers scan this to open the clock-in screen on their phone. Print it and post it at each site, or add it to their welcome pack.</p>
        <div class="qr-url">${esc(url)}</div>
        <p style="font-size:11.5px;color:var(--faint)">Deploy the Hub first, then open this from the live address so the QR points there, not at a preview link.</p>
      </div></div>
    <div class="modal-foot"><button class="btn btn-ghost" onclick="closeModal()">Close</button><button class="btn btn-primary" onclick="printQR()"><i class="ti ti-printer"></i> Print</button></div>`;
  openModal();
}
function printQR(){
  const url=location.origin+location.pathname+"#clock";
  let qrImg="";try{const qr=qrcode(0,"M");qr.addData(url);qr.make();qrImg=qr.createImgTag(8,10);}catch(e){}
  const w=window.open("","_blank");
  w.document.write(`<html><head><title>Clock-in QR</title><style>body{font-family:sans-serif;text-align:center;padding:50px}h1{font-size:26px;margin-bottom:6px}p{color:#555;font-size:15px}.q{margin:30px auto}</style></head><body><h1>${esc(CONFIG.companyName)}</h1><p>Scan to clock in and out</p><div class="q">${qrImg}</div><p style="font-size:12px;color:#999">${esc(url)}</p></body></html>`);
  w.document.close();setTimeout(()=>w.print(),300);
}

boot();
</script>
</body>
</html>
