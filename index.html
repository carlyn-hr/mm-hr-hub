<!--
  ============================================================
  HR HUB  |  Policies + Leave + QR Attendance, one app
  ============================================================
  Two teams: California (W-2 employees) and Philippines (contractors).

  Runs in DEMO MODE out of the box (sample data, resets on refresh).
  To go live, fill in the CONFIG block lower down:

  POLICIES  -> CONFIG.policySheetCsvUrl
      Keep policies in a Google Sheet with headers:
      Category | Policy | Summary | Link | Status | Owner | Updated | Tags | Required
      Then File > Share > Publish to web > CSV, and paste the link.

  LEAVE + ATTENDANCE  -> CONFIG.supabaseUrl + CONFIG.supabaseKey
      In Supabase SQL editor run:

      create table employees (
        id uuid primary key default gen_random_uuid(),
        name text not null, team text not null, email text,
        active boolean default true, balances jsonb default '{}'::jsonb
      );
      create table leave_requests (
        id uuid primary key default gen_random_uuid(),
        employee_id uuid references employees(id) on delete cascade,
        employee_name text, team text, type text,
        start_date date, end_date date, half_day boolean default false,
        days numeric, reason text, status text default 'pending',
        created_at timestamptz default now(), decided_at timestamptz, decided_by text
      );
      create table attendance (
        id uuid primary key default gen_random_uuid(),
        employee_id uuid references employees(id) on delete cascade,
        employee_name text, team text,
        clock_in timestamptz, clock_out timestamptz, hours numeric,
        site text, lat numeric, lng numeric, created_at timestamptz default now()
      );
      alter table employees enable row level security;
      alter table leave_requests enable row level security;
      alter table attendance enable row level security;
      create policy "anon employees" on employees for all using (true) with check (true);
      create policy "anon leave" on leave_requests for all using (true) with check (true);
      create policy "anon attendance" on attendance for all using (true) with check (true);

  Settings > API in Supabase has the Project URL and anon public key.

  THE QR:  Admin > Attendance shows a printable clock-in QR built from
  this page's own URL + #clock. Deploy first, then print it from the
  live site so the QR points at the live address.
  ============================================================
-->

<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --accent:#2b5785; --accent-soft:#e7edf4; --accent-d:#1e3e5f; --gold:#daac4f; --gold-soft:#f6ecd8; --gold-d:#987837;
  --ca:#2563eb; --ca-soft:#e7effe; --ph:#b45c1e; --ph-soft:#fbeede;
  --bg:#f6f7f9; --surface:#fff; --border:#e6e8ee; --border-strong:#d4d8e0;
  --text:#1a1d24; --sub:#6b7280; --faint:#9aa1ad;
  --ok:#15935f; --ok-soft:#e6f4ee; --bad:#c0392b; --bad-soft:#fbeae8;
  --warn:#b97309; --warn-soft:#fbf0dd;
  --radius:14px; --radius-sm:10px; --sidebar-w:248px;
  --shadow:0 1px 2px rgba(20,25,40,.04),0 8px 24px rgba(20,25,40,.06);
}
html,body{height:100%}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--text);
  -webkit-font-smoothing:antialiased;display:flex;min-height:100vh}
.serif{font-family:'DM Serif Display',Georgia,serif;font-weight:400}
button{font-family:inherit;cursor:pointer}
input,select,textarea{font-family:inherit}
a{color:inherit;text-decoration:none}

/* sidebar */
.sidebar{width:var(--sidebar-w);flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);
  display:flex;flex-direction:column;position:sticky;top:0;height:100vh;z-index:40}
.brand{display:flex;align-items:center;gap:12px;padding:18px 16px 14px}
.brand-logo-img{max-width:168px;width:100%;height:auto;display:block}
.brand .logo{width:42px;height:42px;border-radius:11px;background:var(--accent);color:#fff;
  display:flex;align-items:center;justify-content:center;font-weight:700;font-size:16px;flex-shrink:0}
.brand h1{font-size:16px;font-weight:700;letter-spacing:-.2px;line-height:1.1}
.brand p{font-size:11px;color:var(--faint);margin-top:2px}
.side-nav{flex:1;padding:8px 12px}
.nav-label{font-size:10.5px;font-weight:600;letter-spacing:.7px;text-transform:uppercase;color:var(--faint);padding:14px 12px 7px}
.nav-item{display:flex;align-items:center;gap:12px;width:100%;text-align:left;border:none;background:none;
  color:var(--sub);padding:11px 12px;border-radius:var(--radius-sm);font-size:14.5px;font-weight:600;transition:background .12s,color .12s}
.nav-item i{font-size:20px;width:20px;text-align:center;flex-shrink:0}
.nav-item .pdot{margin-left:auto;background:var(--bad);color:#fff;font-size:10.5px;font-weight:700;border-radius:20px;
  min-width:18px;height:18px;display:inline-flex;align-items:center;justify-content:center;padding:0 5px}
.nav-item:hover{background:var(--bg);color:var(--text)}
.nav-item.active{background:var(--accent-soft);color:var(--accent-d)}
.side-foot{padding:14px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:4px}
.side-foot button{display:flex;align-items:center;gap:10px;border:none;background:none;color:var(--sub);
  font-size:13px;font-weight:600;padding:9px 12px;border-radius:9px;width:100%;text-align:left}
.side-foot button:hover{background:var(--bg);color:var(--text)}
.side-foot button i{font-size:18px}
.src{display:flex;align-items:center;gap:7px;font-size:11px;color:var(--faint);padding:6px 12px}

/* main */
.main{flex:1;min-width:0;display:flex;flex-direction:column}

.search{flex:1;max-width:440px;display:flex;align-items:center;gap:9px;background:var(--surface);
  border:1px solid var(--border);border-radius:11px;padding:0 13px;height:40px}
.search:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}

  border:1px solid var(--border);border-radius:20px;padding:7px 13px;background:var(--surface)}

.home-btn{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--border);background:var(--surface);color:var(--sub);border-radius:9px;padding:7px 12px;font-size:13px;font-weight:600;cursor:pointer}

.home-btn i{font-size:16px}
.lang-switch{margin-left:auto;display:flex;gap:2px;background:var(--accent-soft);border-radius:9px;padding:2px}
.lang-btn{border:none;background:transparent;color:var(--sub);font-size:12px;font-weight:700;padding:5px 9px;border-radius:7px;cursor:pointer}
.lang-btn.on{background:var(--surface);color:var(--accent);box-shadow:0 1px 3px rgba(0,0,0,.08)}
.action-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px;margin-bottom:24px}
.action-card{display:flex;flex-direction:column;align-items:flex-start;text-align:left;padding:20px 20px 22px;border:1px solid var(--border);border-radius:16px;background:var(--surface);cursor:pointer;min-height:152px;transition:border-color .15s,box-shadow .15s,transform .15s;box-shadow:0 1px 2px rgba(20,25,40,.04)}
.action-card:hover{border-color:var(--accent);box-shadow:0 8px 24px rgba(20,25,40,.10);transform:translateY(-2px)}
.action-card .ai{width:48px;height:48px;border-radius:13px;display:flex;align-items:center;justify-content:center;background:var(--accent-soft);color:var(--accent);font-size:23px;flex-shrink:0;margin-bottom:auto}
.action-card h3{font-size:16px;margin:0;color:var(--text);font-weight:700;letter-spacing:-.2px}
.action-card p{font-size:12.5px;color:var(--faint);margin:5px 0 0;line-height:1.45}
@media(max-width:640px){.action-grid{grid-template-columns:1fr}}

.content{flex:1;overflow-y:auto;padding:28px;zoom:1.12}
.wrap{max-width:1060px;margin:0 auto}

.page-head{margin-bottom:22px}
.eyebrow{font-size:11px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;color:var(--accent);margin-bottom:7px}
.page-title{font-size:27px;letter-spacing:-.4px;line-height:1.15}
.page-sub{font-size:14px;color:var(--sub);margin-top:8px;line-height:1.5;max-width:640px}

/* shared bits */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px}
.section-label{font-size:11px;font-weight:600;letter-spacing:.7px;text-transform:uppercase;color:var(--faint);margin:0 0 13px}
.team-chip{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:600;border-radius:20px;padding:3px 10px}
.team-chip.ca{background:var(--ca-soft);color:var(--ca)} .team-chip.ph{background:var(--ph-soft);color:var(--ph)}
.team-dot{width:8px;height:8px;border-radius:50%} .team-dot.ca{background:var(--ca)} .team-dot.ph{background:var(--ph)}
.badge{font-size:10.5px;font-weight:600;border-radius:20px;padding:3px 9px;display:inline-flex;align-items:center;gap:4px}
.badge.active,.badge.approved{background:var(--ok-soft);color:var(--ok)}
.badge.pending,.badge.review{background:var(--warn-soft);color:var(--warn)}
.badge.rejected,.badge.draft{background:var(--bad-soft);color:var(--bad)}
.badge.req{background:var(--gold-soft);color:var(--gold-d)}

.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;border:none;border-radius:10px;
  font-size:13.5px;font-weight:600;padding:11px 18px;transition:filter .12s,background .12s,border-color .12s}
.btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{filter:brightness(.93)}
.btn-primary:disabled{background:var(--border-strong);cursor:not-allowed}
.btn-ghost{background:var(--surface);border:1px solid var(--border-strong);color:var(--text)}.btn-ghost:hover{border-color:var(--sub)}
.btn-ok{background:var(--ok);color:#fff}.btn-ok:hover{filter:brightness(.93)}
.btn-bad{background:var(--surface);border:1px solid var(--bad);color:var(--bad)}.btn-bad:hover{background:var(--bad-soft)}
.btn-sm{padding:8px 13px;font-size:12.5px}
.linkbtn{font-size:12.5px;color:var(--accent);font-weight:600;background:none;border:none}

.field{margin-bottom:15px}
.field label{display:block;font-size:12.5px;font-weight:600;color:var(--sub);margin-bottom:6px}
.f-input{width:100%;border:1px solid var(--border-strong);border-radius:10px;padding:11px 13px;font-size:14px;color:var(--text);background:var(--surface)}
.f-input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
textarea.f-input{resize:vertical;min-height:70px}
.row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.check{display:flex;align-items:center;gap:9px;font-size:13px;cursor:pointer;user-select:none}
.check input{width:17px;height:17px;accent-color:var(--accent)}

.empty{text-align:center;padding:44px 18px;color:var(--sub)}
.empty i{font-size:38px;opacity:.3;display:block;margin-bottom:12px}
.empty p{font-size:13.5px;max-width:380px;margin:0 auto;line-height:1.5}
.empty h3{font-size:16px;color:var(--text);margin-bottom:6px}
.spinner{width:32px;height:32px;border:3px solid var(--accent-soft);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}

/* ===== POLICIES ===== */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:13px;margin-bottom:30px}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 17px}
.stat .n{font-size:25px;font-weight:700;letter-spacing:-.5px} .stat .l{font-size:12px;color:var(--sub);margin-top:3px}
.stat.click{cursor:pointer;transition:border-color .12s,transform .12s}.stat.click:hover{border-color:var(--border-strong);transform:translateY(-2px)}
.cat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(244px,1fr));gap:15px}
.cat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px;text-align:left;
  transition:border-color .12s,transform .12s,box-shadow .12s;display:flex;flex-direction:column;gap:11px}
.cat-card:hover{border-color:var(--border-strong);transform:translateY(-2px);box-shadow:var(--shadow)}
.cat-card .icon{width:40px;height:40px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:21px}
.cat-card h3{font-size:15px;font-weight:700;letter-spacing:-.2px} .cat-card .meta{font-size:12px;color:var(--sub);margin-top:2px}
.cat-card .preview{font-size:12px;color:var(--faint);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.policy-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:14px}
.policy-card{position:relative;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  padding:17px 17px 17px 21px;text-align:left;transition:border-color .12s,transform .12s,box-shadow .12s;overflow:hidden}
.policy-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--cat,#ccc)}
.policy-card:hover{border-color:var(--border-strong);transform:translateY(-2px);box-shadow:var(--shadow)}
.pc-cat{font-size:11px;font-weight:600;color:var(--cat,var(--sub))}
.pc-name{font-size:15px;font-weight:700;letter-spacing:-.2px;line-height:1.25;margin:6px 0}
.pc-sum{font-size:13px;color:var(--sub);line-height:1.5;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.pc-foot{display:flex;align-items:center;gap:8px;margin-top:12px;flex-wrap:wrap}
.muted-row{font-size:12px;color:var(--faint);display:flex;align-items:center;gap:5px}.muted-row i{font-size:14px}

/* ===== LEAVE ===== */
.grid2{display:grid;grid-template-columns:1.1fr .9fr;gap:20px;align-items:start}
@media(max-width:820px){.grid2{grid-template-columns:1fr}}
.who{display:flex;align-items:center;gap:12px;margin-bottom:20px;flex-wrap:wrap}
.who label{font-size:13px;color:var(--sub);font-weight:500}
.who-select{border:1px solid var(--border-strong);border-radius:10px;padding:10px 13px;font-size:14px;font-weight:600;min-width:230px;color:var(--text);background:var(--surface)}
.bal-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(135px,1fr));gap:12px}
.bal{border:1px solid var(--border);border-radius:var(--radius-sm);padding:13px}
.bal .n{font-size:24px;font-weight:700;letter-spacing:-.5px} .bal .n small{font-size:12px;font-weight:600;color:var(--faint)}
.bal .t{font-size:11.5px;color:var(--sub);margin-top:2px} .bal.neg .n{color:var(--bad)}
.calc-note{font-size:12.5px;color:var(--sub);background:var(--bg);border-radius:9px;padding:10px 12px;margin-top:4px;display:flex;align-items:center;gap:8px}
.calc-note i{font-size:16px;color:var(--accent)} .calc-note b{color:var(--text)}
.req{border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px 15px;margin-bottom:11px}
.req-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
.req-type{font-size:14px;font-weight:700;letter-spacing:-.2px}
.req-dates{font-size:12.5px;color:var(--sub);margin-top:3px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.req-reason{font-size:13px;color:var(--sub);margin-top:9px;line-height:1.5}
.req-foot{display:flex;align-items:center;gap:8px;margin-top:12px;flex-wrap:wrap}
.days-tag{font-size:12px;font-weight:700;background:var(--bg);border-radius:7px;padding:3px 9px}
.filterbar{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.fbtn{border:1px solid var(--border);background:var(--surface);color:var(--sub);border-radius:20px;padding:7px 14px;font-size:12.5px;font-weight:600}
.fbtn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.people-row{display:flex;align-items:center;gap:12px;padding:13px 0;border-bottom:1px solid var(--border)}
.people-row:last-child{border-bottom:none}
.avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;color:#fff;flex-shrink:0}
.people-name{font-size:14px;font-weight:600} .people-sub{font-size:12px;color:var(--faint);margin-top:1px}
.people-bal{margin-left:auto;display:flex;gap:7px;flex-wrap:wrap;justify-content:flex-end;align-items:center}
.mini-bal{font-size:11.5px;color:var(--sub);background:var(--bg);border:1px solid var(--border);border-radius:7px;padding:2px 8px}

/* ===== ATTENDANCE / CLOCK ===== */
.clock-screen{max-width:460px;margin:10px auto;text-align:center}
.clock-time{font-size:46px;letter-spacing:-1px;line-height:1;margin:6px 0 2px}
.clock-date{font-size:14px;color:var(--sub);margin-bottom:22px}
.clock-card{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:24px;box-shadow:var(--shadow)}
.clock-who{border:1px solid var(--border-strong);border-radius:12px;padding:13px;font-size:16px;font-weight:600;width:100%;color:var(--text);background:var(--surface);margin-bottom:8px}
.status-line{font-size:13.5px;color:var(--sub);margin:16px 0;min-height:20px}
.status-line b{color:var(--text)}
.status-in{color:var(--ok);font-weight:600}
.big-btn{width:100%;border:none;border-radius:14px;padding:20px;font-size:18px;font-weight:700;color:#fff;display:flex;align-items:center;justify-content:center;gap:11px;transition:filter .12s}

.big-in{background:var(--ok)} .big-out{background:var(--bad)} .big-btn:hover{filter:brightness(.94)}
.big-btn:disabled{background:var(--border-strong);cursor:not-allowed}
.site-field{margin-bottom:14px;text-align:left}
.onb-sig{display:flex;gap:8px;margin-top:8px;width:100%}
.onb-sig input{flex:1;min-width:0;border:1px solid var(--line);border-radius:9px;padding:8px 10px;font-size:13.5px;font-family:inherit}
.onb-signed{display:block;font-size:11.5px;color:#2f6f5e;margin-top:4px;font-weight:600}

.onb-prow i{margin-top:1px;color:var(--faint)}
.onb-prow.done i{color:#2f6f5e}
.kiosk .sidebar{display:none}
.kiosk .topbar{justify-content:center}
.kiosk .menu-btn{display:none}

.live-list{display:flex;flex-direction:column;gap:9px}

.live-row .since{margin-left:auto;font-size:12.5px;color:var(--sub)}
.pulse{width:9px;height:9px;border-radius:50%;background:var(--ok);box-shadow:0 0 0 0 rgba(21,147,95,.5);animation:pulse 2s infinite}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(21,147,95,.45)}70%{box-shadow:0 0 0 7px rgba(21,147,95,0)}100%{box-shadow:0 0 0 0 rgba(21,147,95,0)}}

.ts-table{width:100%;border-collapse:collapse;font-size:13px}
.ts-table th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--faint);font-weight:600;padding:9px 10px;border-bottom:1px solid var(--border)}
.ts-table td{padding:10px;border-bottom:1px solid var(--border)}
.ts-table tr:last-child td{border-bottom:none}
.ts-table .num{text-align:right;font-variant-numeric:tabular-nums}
.ts-table .ot{color:var(--warn);font-weight:600} .ts-table .dt{color:var(--bad);font-weight:600}

.daterow{display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap;margin-bottom:18px}
.daterow .field{margin-bottom:0}

.qr-wrap{display:flex;gap:22px;align-items:center;flex-wrap:wrap}
.qr-box{background:#fff;border:1px solid var(--border);border-radius:14px;padding:16px;line-height:0}

.qr-info{flex:1;min-width:220px}
.qr-info p{font-size:13px;color:var(--sub);line-height:1.55;margin-bottom:10px}
.qr-url{font-size:12px;color:var(--accent);word-break:break-all;background:var(--bg);border-radius:8px;padding:8px 10px;margin-bottom:12px}

/* panel + modal + toast */
.scrim{position:fixed;inset:0;background:rgba(20,25,40,.32);opacity:0;pointer-events:none;transition:opacity .2s;z-index:60}
.scrim.open{opacity:1;pointer-events:auto}
.panel{position:fixed;top:0;right:0;height:100vh;width:min(460px,100%);background:var(--surface);
  box-shadow:-12px 0 40px rgba(20,25,40,.14);transform:translateX(100%);transition:transform .26s cubic-bezier(.4,0,.2,1);z-index:70;display:flex;flex-direction:column}
.panel.open{transform:translateX(0)}
.panel-head{padding:22px 24px 18px;border-bottom:1px solid var(--border);position:relative}
.panel-close{position:absolute;top:18px;right:18px;border:none;background:var(--bg);width:34px;height:34px;border-radius:9px;color:var(--sub);font-size:19px;display:flex;align-items:center;justify-content:center}
.panel-title{font-size:21px;line-height:1.2;letter-spacing:-.3px;padding-right:30px;font-weight:700}
.panel-body{flex:1;overflow-y:auto;padding:22px 24px;zoom:1.1}
.panel-sum{font-size:14.5px;line-height:1.62;color:#33373f}
.policy-body{font-size:14px;line-height:1.65;color:#33373f}
.policy-body p{margin-bottom:12px}
.policy-body ul{margin:0 0 12px 20px;padding:0}
.policy-body li{margin-bottom:6px}
.policy-body .ca-note{background:var(--accent-soft);border-radius:10px;padding:11px 13px;font-size:13px;color:var(--accent-d);margin-bottom:4px}
.policy-body .ca-note b{color:var(--accent-d)}
.meta-list{margin-top:18px;border-top:1px solid var(--border);padding-top:16px;display:flex;flex-direction:column;gap:12px}
.meta-item{display:flex;align-items:flex-start;gap:11px;font-size:13px}
.meta-item i{font-size:17px;color:var(--faint);width:17px;flex-shrink:0;margin-top:1px}
.meta-item .k{color:var(--faint);width:74px;flex-shrink:0} .meta-item .v{font-weight:500}
.tag{display:inline-block;font-size:11.5px;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:2px 8px;color:var(--sub);margin:0 5px 5px 0}
.sub-head{font-size:11px;font-weight:600;letter-spacing:.7px;text-transform:uppercase;color:var(--faint);margin:24px 0 11px}
.sub-item{display:flex;align-items:center;gap:11px;width:100%;text-align:left;border:none;background:none;padding:11px 12px;border-radius:var(--radius-sm)}
.sub-item:hover{background:var(--bg)} .sub-item .sub-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.sub-item .sub-name{font-size:13.5px;font-weight:500;flex:1;min-width:0}
.sub-item .sub-name small{display:block;font-weight:400;color:var(--faint);font-size:11.5px;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.panel-foot{padding:18px 24px;border-top:1px solid var(--border)}
.foot-note{font-size:11.5px;color:var(--faint);text-align:center;margin-top:9px}

.modal-scrim{position:fixed;inset:0;background:rgba(20,25,40,.34);display:none;align-items:center;justify-content:center;z-index:80;padding:20px}
.modal-scrim.open{display:flex}
.modal{background:var(--surface);border-radius:16px;width:min(440px,100%);padding:24px;box-shadow:var(--shadow);max-height:90vh;overflow:auto}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);opacity:0;background:#1a1d24;color:#fff;
  font-size:13.5px;font-weight:500;padding:12px 20px;border-radius:11px;box-shadow:0 10px 30px rgba(0,0,0,.2);
  transition:opacity .2s,transform .2s;z-index:90;pointer-events:none;display:flex;align-items:center;gap:9px}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)} .toast i{font-size:18px}

@media(max-width:820px){
  .sidebar{position:fixed;transform:translateX(-100%);transition:transform .24s}
  .sidebar.open{transform:translateX(0);box-shadow:12px 0 40px rgba(20,25,40,.18)}
  .menu-btn{display:flex} .stats{grid-template-columns:repeat(2,1fr)} .content{padding:22px 16px} .topbar{padding:12px 16px}
}
@media(prefers-reduced-motion:reduce){*{transition:none!important;animation-duration:.001ms!important}}
/* Directory */

.dir-search input{flex:1;border:none;outline:none;background:none;font-size:15px;color:var(--text)}
.dir-list{display:flex;flex-direction:column;gap:8px}

.dir-row:hover{border-color:var(--accent);background:var(--accent-soft)}

.dir-main{flex:1;min-width:0;display:flex;flex-direction:column}
.dir-name{font-weight:650;font-size:14.5px;color:var(--text)}
.dir-sub{font-size:12px;color:var(--faint);margin-top:1px}

.stage-n{background:var(--accent-soft);color:var(--accent);border-radius:999px;padding:1px 8px;font-size:11px}

.cand-row{display:flex;align-items:center;gap:12px;width:100%;text-align:left;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 12px;cursor:pointer;margin-bottom:7px;transition:border-color .12s,background .12s}

.stage-btns{display:flex;flex-wrap:wrap;gap:6px}

.post-card,.onb-card{display:flex;gap:14px;align-items:flex-start}
.post-title{font-size:15px;font-weight:700;color:var(--text)}
.post-meta{font-size:12.5px;color:var(--faint);margin-top:2px}
.post-desc{font-size:13px;color:var(--sub);margin-top:6px;line-height:1.45;white-space:pre-wrap}
.post-side{display:flex;align-items:center;gap:6px;flex-shrink:0;flex-wrap:wrap;justify-content:flex-end;max-width:120px}
.ic-btn{width:32px;height:32px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--sub);cursor:pointer;display:flex;align-items:center;justify-content:center}

.form-d{font-size:12.5px;color:var(--sub);margin-top:2px}

.brk-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:11px 8px;border:1px solid var(--border-strong);border-radius:12px;background:var(--surface);color:var(--text);font-weight:650;font-size:13.5px;cursor:pointer}

.brk-btn small{font-size:10.5px;font-weight:500;color:var(--faint)}
.brk-btn:hover{border-color:var(--accent);background:var(--accent-soft)}
.brk-btn.brk-end{flex-direction:row;justify-content:center;gap:7px;margin-top:12px;border-color:var(--accent);background:var(--accent-soft);color:var(--accent)}

.status-brk{color:var(--gold-d);font-weight:700}

const POL_SAMPLE = [
  ["Company & Employment","At-Will Employment","Employment is at-will: either side may end it anytime. Nothing here is a contract.","","Active","HR","Jun 2026","atwill","yes","<p>Employment with M &amp; M Solutions is at-will. Either you or the company may end the employment relationship at any time, with or without cause and with or without notice.</p><p>No supervisor can change this except the owner, in a signed writing. Nothing in these policies creates a contract or guarantees employment for any set period.</p>"],
  ["Company & Employment","Equal Employment Opportunity","We base every employment decision on qualifications, never on a protected characteristic.","","Active","HR","Jun 2026","eeo","yes","<p>We are an equal opportunity employer. Every employment decision, hiring, assignments, pay, training, promotion, and discharge, is based on qualifications and performance, never on a protected characteristic.</p><p class=\"ca-note\"><b>California note:</b> Protected characteristics include race, color, religion, sex, gender, gender identity and expression, sexual orientation, pregnancy, national origin, ancestry, age (40+), disability, medical condition, genetic information, marital status, and military or veteran status.</p>"],
  ["Company & Employment","Anti-Harassment, Discrimination & Retaliation","Zero tolerance, the channels to report safely, and no retaliation.","","Active","HR","Jun 2026","harassment,reporting","yes","<p>We do not tolerate harassment, discrimination, or retaliation of any kind. This includes unwelcome comments, slurs, jokes, images, or advances based on any protected characteristic, and any form of sexual harassment.</p><p>If you experience or witness this, report it to your supervisor, the office, or the owner. We investigate promptly, keep it as confidential as we can, and never retaliate against anyone for a good-faith report.</p><p class=\"ca-note\"><b>California note:</b> Janitorial employers must provide in-person harassment prevention training every two years through a state Qualified Organization, on top of the general training required of employers with five or more staff.</p>"],
  ["Company & Employment","Code of Conduct & Professionalism","The standards of behaviour expected on the job and at client sites.","","Active","HR","Jun 2026","conduct","no","<p>We expect every team member to be reliable, honest, and respectful. Show up on time and ready to work, treat clients and coworkers with courtesy, follow reasonable instructions, protect client property, and never be under the influence of alcohol or drugs while on duty.</p>"],
  ["Company & Employment","Confidentiality & Trade Secrets","Keeping client lists, codes, keys, and schedules private, during and after employment.","","Active","HR","Jun 2026","confidentiality","no","<p>During your work you learn private information about our clients and business: client lists, schedules, alarm codes, keys, and pricing. Keep all of it confidential, during and after your employment.</p><p>You will sign a separate confidentiality agreement, which stays in force after you leave.</p>"],
  ["Wages, Hours & Timekeeping","Paydays & Pay Periods","Weekly pay, paydays, wage statements, and who to ask about your paycheck.","","Active","Finance","Jun 2026","payroll,paydays","yes","<p>We pay weekly. You receive an itemized wage statement each pay period showing your hours, rate, gross and net pay, and deductions. Check it, and tell the office right away if anything looks wrong.</p><p class=\"ca-note\"><b>California note:</b> California requires regular paydays and itemized wage statements with specific data points, and wages must be paid within the timeframes set for your pay frequency.</p>"],
  ["Wages, Hours & Timekeeping","Timekeeping & No Off-the-Clock Work","Record all time accurately and never work off the clock.","","Active","Operations","Jun 2026","timekeeping","yes","<p>Record all of your time accurately. Clock in when you start and clock out when you finish, using the QR clock at each site. Never work off the clock. If you do any work, it must be recorded so you are paid for it.</p><p>Falsifying time records, your own or anyone else's, is serious misconduct.</p>"],
  ["Wages, Hours & Timekeeping","Meal & Rest Breaks","California meal and rest break rules and the premium for a missed break.","","Active","Operations","Jun 2026","breaks,meal,rest","yes","<p>You are entitled to meal and rest breaks, and we expect you to take them.</p><ul><li>A 30-minute unpaid, duty-free meal break must start before the end of your fifth hour of work. A second meal break applies to shifts longer than 10 hours.</li><li>A paid 10-minute rest break is provided for every four hours worked.</li><li>If you cannot take a break, tell your supervisor so we can pay the required one-hour premium and fix the schedule.</li></ul>"],
  ["Wages, Hours & Timekeeping","Overtime","How daily and weekly overtime and double-time are paid in California.","","Active","Finance","Jun 2026","overtime,pay","yes","<p>Non-exempt employees are paid overtime under California rules:</p><ul><li>1.5x your regular rate for hours over 8 in a workday and over 40 in a workweek</li><li>2x for hours over 12 in a workday</li><li>On the 7th consecutive day in a workweek, 1.5x for the first 8 hours and 2x beyond 8</li></ul><p>Overtime should be approved in advance, but if you work it, you are paid for it.</p>"],
  ["Wages, Hours & Timekeeping","Travel Time & Reporting Time","Which travel between office and sites and pickup runs is paid, and reporting-time pay.","","Active","Operations","Jun 2026","travel,reporting","yes","<p>Time you spend traveling for work during the day is paid: from the office to a site, between sites, and on any required pickup run. Your ordinary commute from home to your first site and back is generally not paid.</p><p class=\"ca-note\"><b>California note:</b> If you report to work as scheduled but are sent home early, reporting-time pay rules may entitle you to extra pay. Ask the office if this happens.</p>"],
  ["Wages, Hours & Timekeeping","Expense & Mileage Reimbursement","How to get reimbursed for required mileage and work expenses (Labor Code 2802).","","Active","Finance","Jun 2026","expenses,mileage","yes","<p>We reimburse the necessary expenses you incur doing your job, such as mileage for required driving between sites and supplies we ask you to buy. Submit expenses to the office with receipts or a mileage log.</p><p class=\"ca-note\"><b>California note:</b> Labor Code 2802 requires reimbursement of all necessary business expenses.</p>"],
  ["Time Off & Leaves","Paid Sick Leave","California paid sick leave: 40 hours a year and how to use it.","","Active","HR","Jun 2026","sick,leave","yes","<p>You receive 40 hours (5 days) of paid sick leave each year, given to you up front. New employees can use it after 90 days on the job.</p><p>Use it for your own or a family member's illness, preventive care, or certain safe-time reasons. Request it in the Time off tab and give as much notice as you can. We never retaliate for using sick leave.</p><p class=\"ca-note\"><b>California note:</b> The state minimum is 40 hours or 5 days a year, whichever is greater. Some cities require more, so confirm any local ordinance that applies.</p>"],
  ["Time Off & Leaves","Vacation / PTO","How paid time off accrues and how to request it. Accrued vacation is wages in CA.","","Active","HR","Jun 2026","vacation,pto","no","<p>If we offer paid vacation or PTO, it accrues as you work and you request it in the Leave tab. We will tell you your accrual rate when it applies to you.</p><p class=\"ca-note\"><b>California note:</b> Accrued vacation is earned wages. Use-it-or-lose-it forfeiture is not allowed, though a reasonable cap is, and unused accrued vacation is paid out when you leave.</p>"],
  ["Time Off & Leaves","Protected Leaves of Absence","Job-protected leaves: CFRA, pregnancy disability, jury, military, and more.","","Active","HR","Jun 2026","leave,protected","yes","<p>You may be eligible for job-protected leave for family and medical reasons (CFRA), pregnancy disability, jury duty, voting, military service, and more. If you need time off for one of these, contact the office early so we can explain your rights and the process.</p>"],
  ["Time Off & Leaves","Lactation Accommodation","Break time and a private space to express breast milk, as California law requires.","","Active","HR","Jun 2026","lactation","yes","<p>We provide reasonable break time and a private space, other than a bathroom, to express breast milk, as California law requires. Let the office know and we will arrange it.</p>"],
  ["Workplace Conduct & Safety","Injury & Illness Prevention Program (IIPP)","Our written Cal/OSHA safety program and your part in it.","","Active","Operations","Jun 2026","safety,iipp","yes","<p>We maintain a written Injury and Illness Prevention Program, as Cal/OSHA requires. Follow safe work practices, use the protective equipment provided, and report unsafe conditions. Ask the office for a copy.</p>"],
  ["Workplace Conduct & Safety","Workers' Compensation","Coverage for work injuries and how to report one the same day.","","Active","Operations","Jun 2026","workerscomp,injury","yes","<p>We carry workers' compensation insurance. If you are injured or become ill because of your work, however minor, report it to your supervisor the same day so we can get you care and start a claim. We never retaliate for reporting a work injury.</p>"],
  ["Workplace Conduct & Safety","Chemical Safety & SDS","Safe handling of cleaning chemicals, SDS access, never mixing, and PPE.","","Active","Operations","Jun 2026","chemicals,sds,ppe","yes","<p>Cleaning chemicals can be dangerous if mishandled.</p><ul><li>Read the label and Safety Data Sheet before using a product.</li><li>Never mix products. Bleach and ammonia together create toxic gas.</li><li>Dilute as directed, work in ventilated areas, and wear the gloves and eye protection provided.</li><li>Store and label products correctly, and report any spill or reaction right away.</li></ul>"],
  ["Workplace Conduct & Safety","Drug & Alcohol-Free Workplace","No impairment on duty or on client sites.","","Active","HR","Jun 2026","drugfree","no","<p>Working under the influence puts you, your coworkers, and clients at risk. You may not possess, use, or be impaired by alcohol or unlawful drugs while on duty or on a client site. Violations may lead to discipline up to termination.</p>"],
  ["Workplace Conduct & Safety","Dress Code & Uniform","Clean uniform, visible ID, and safe footwear on every job.","","Active","Operations","Jun 2026","uniform,dresscode","no","<p>Wear your clean company uniform and visible ID on every job, with closed-toe, non-slip shoes. You represent M &amp; M Solutions at every site, so a neat, professional appearance matters.</p>"],
  ["Workplace Conduct & Safety","Company Vehicle & Safe Driving","Rules for driving a company vehicle or driving for work.","","Active","Operations","Jun 2026","vehicle,driving","no","<p>If you drive a company vehicle or drive for work, hold a valid license and insurance, operate the vehicle safely and legally, never drive while impaired, and report any accident or damage immediately.</p>"],
  ["Workplace Conduct & Safety","Cell Phone & Distracted Driving","Hands-free only while driving, as California law requires.","","Active","Operations","Jun 2026","phone,driving","no","<p>Do not use a handheld phone while driving. California law requires hands-free operation. Make calls and texts before you set off or after you park.</p>"],
  ["Workplace Conduct & Safety","Vehicle & Traffic Citations","Who pays traffic, parking, and toll citations during work, and how to report them.","","Active","Operations","Jul 2026","vehicle,citations,tickets,parking,tolls","no","<p>Driving safely and legally is part of your job. No schedule, route, or client request ever requires you to speed, use a handheld phone, or park illegally. If you cannot find legal parking at a site, contact your supervisor before parking illegally.</p><ul><li><b>Moving violations are yours.</b> A moving violation issued to you during work hours, like speeding or phone use, is your personal fine, whether you were driving your own vehicle or a company vehicle. The company will not pay it or reimburse it.</li><li><b>Parking and toll citations.</b> A parking or toll citation is your responsibility if legal options were available. If you believe the company directed the parking or the assignment left you no lawful option, report it within 24 hours and the office will review whether the company covers it. Ordinary lawful parking costs, like meters and lots, are reimbursed through the normal expense process.</li><li><b>Report every citation on a company vehicle.</b> Report it to your supervisor within 24 hours and turn in the ticket itself. Unreported citations grow late fees and DMV holds against the company.</li><li><b>No paycheck deductions.</b> We never deduct a fine or citation from your wages. If the company pays a citation that was your responsibility, any repayment is voluntary and handled outside payroll.</li><li><b>Your time is still paid.</b> If you are stopped by police or dealing with a citation during your shift, that time stays on the clock.</li></ul><p>Moving violations during work hours are treated as a safety matter and may lead to corrective action, changes to driving assignments, or termination for repeated or serious violations. The company may review DMV records of employees who drive for work.</p><p class=\"ca-note\"><b>California note:</b> Labor Code 221 and 224 bar deducting fines from wages, Labor Code 2802 governs which work expenses are reimbursed, and time spent on a traffic stop during your shift is hours worked under Wage Order 5.</p>"],
  ["Workplace Conduct & Safety","Social Media","Keep client and confidential information off social media.","","Active","HR","Jun 2026","socialmedia","no","<p>Off the clock, your social media is your own. Never post client information, photos of client property, schedules, or anything confidential, and do not speak for the company without permission. Harassment online is treated the same as harassment at work.</p>"],
  ["Process & Records","Progressive Discipline","The fair, step-by-step process when conduct or performance falls short.","","Active","HR","Jun 2026","discipline","no","<p>When conduct or performance falls short, we generally use a fair, step-by-step approach: a reminder, a written warning, a final warning, then termination. Serious misconduct may skip steps and lead to immediate termination. This does not change the at-will nature of employment.</p>"],
  ["Process & Records","Complaint / Grievance Procedure","How to raise a concern and what happens next, with no retaliation.","","Active","HR","Jun 2026","grievance,complaint","no","<p>If you have a concern or complaint, raise it with your supervisor, the office, or the owner, whichever you are comfortable with. We look into it and never retaliate against you for raising it in good faith.</p>"],
  ["Process & Records","Personnel Records Access","Your right to inspect and copy your personnel and pay records.","","Active","HR","Jun 2026","records","yes","<p>You have the right to inspect and copy your personnel records and the records relating to your pay. Ask the office in writing and we will arrange it within the timeframe the law requires.</p><p class=\"ca-note\"><b>California note:</b> Labor Code 1198.5 and 226 give employees the right to inspect personnel and payroll records.</p>"],
  ["Process & Records","Background Checks & Fair Chance","How we handle background checks under the Fair Chance Act and FCRA.","","Active","HR","Jun 2026","background,fairchance","yes","<p>If we run a background check, we follow the federal Fair Credit Reporting Act and California's Fair Chance Act. We do not ask about conviction history until after a conditional job offer, and we follow the required process before relying on any record.</p>"],
  ["Process & Records","Resignation & Termination","Notice, returning property, and California final-pay timing.","","Active","HR","Jun 2026","offboarding,finalpay","no","<p>If you decide to leave, we appreciate as much notice as you can give. On separation, return all company property, keys, uniforms, and equipment. Your final pay, including any accrued unused vacation, is provided within the timeframes California law requires.</p><p class=\"ca-note\"><b>California note:</b> Final pay timing: if we discharge you, immediately; if you quit without notice, within 72 hours; if you give at least 72 hours' notice, on your last day.</p>"],
  ["Compliance","Janitorial Registration (AB 1978)","We are registered as a property service employer with the California Labor Commissioner.","","Active","HR","Jun 2026","compliance,ab1978,janitorial","yes","<p>Under the Property Service Workers Protection Act (AB 1978), California janitorial employers register each year with the Labor Commissioner and keep records of the work performed. M &amp; M Solutions maintains this registration and follows the Act.</p><p class=\"ca-note\"><b>California note:</b> Registration is renewed annually with the Division of Labor Standards Enforcement, and staff receive the required sexual violence and harassment prevention training.</p>"],
  ["Compliance","Sexual Harassment","Zero tolerance for sexual harassment, what it is, and how to report it safely without retaliation.","","Active","HR","Jul 2026","harassment,sexual harassment,reporting","yes","<p>M &amp; M Solutions does not tolerate sexual harassment. Everyone here has the right to a workplace free of it, at the office, a client site, in a company vehicle, or in any work-related setting or message.</p><p>Sexual harassment means unwelcome sexual advances, requests for sexual favors, and other unwelcome conduct of a sexual nature. It can be verbal, visual, or physical, and it does not have to be motivated by attraction. It covers quid pro quo, where a job benefit is tied to accepting or rejecting sexual conduct, and a hostile work environment, where the conduct is severe or repeated enough to make the workplace intimidating or offensive.</p><p>Examples include unwanted touching, sexual comments, jokes, or questions, sending sexual images or messages, repeated unwanted advances, and spreading sexual rumors. It can happen between any two people regardless of gender, and it can come from a coworker, a supervisor, or a client.</p><p>If you experience or witness sexual harassment, report it right away. You can use any of these, and you do not have to go to your direct supervisor if that is the person involved:</p><ul><li>Your supervisor or crew lead</li><li>The office or HR</li><li>The owner directly</li></ul><p>We never retaliate against you for a good-faith report or for taking part in an investigation. We investigate promptly and fairly, keep it as confidential as we can, and anyone who violates this policy faces discipline up to termination. You can also file with the California Civil Rights Department (calcivilrights.ca.gov) or the EEOC (eeoc.gov), and there are deadlines, so do not wait.</p><p class=\"ca-note\"><b>California note:</b> California requires harassment prevention training for supervisors and non-supervisors at employers with five or more employees, and janitorial employers must provide in-person training every two years through a state Qualified Organization (Labor Code 1429.5).</p>"],
  ["Compliance","Required Notices & Training","The notices and training the law requires us to give you.","","Active","HR","Jun 2026","compliance,notices,training","yes","<p>At hire and during your employment we give you the notices California requires: the wage notice (Labor Code 2810.5), paid sick leave information, workers' compensation information, and the harassment and pregnancy rights pamphlets. We also provide the required harassment prevention training. Ask the office if you have not received any of these.</p>"]

const POL_ES={"Sexual Harassment": {"name": "Acoso sexual", "summary": "Cero tolerancia al acoso sexual, qué es y cómo reportarlo de forma segura y sin represalias.", "body": "<p>M &amp; M Solutions no tolera el acoso sexual. Todos aquí tienen derecho a un lugar de trabajo libre de él, en la oficina, en el sitio de un cliente, en un vehículo de la empresa o en cualquier entorno o mensaje relacionado con el trabajo.</p><p>El acoso sexual son insinuaciones sexuales no deseadas, solicitudes de favores sexuales y otras conductas no deseadas de naturaleza sexual. Puede ser verbal, visual o físico, y no tiene que estar motivado por atracción. Incluye el quid pro quo, cuando un beneficio laboral se condiciona a aceptar o rechazar una conducta sexual, y el ambiente de trabajo hostil, cuando la conducta es lo bastante grave o repetida como para volver el lugar de trabajo intimidante u ofensivo.</p><p>Algunos ejemplos: tocamientos no deseados, comentarios, bromas o preguntas de tipo sexual, enviar imágenes o mensajes sexuales, insinuaciones no deseadas repetidas y difundir rumores sexuales. Puede ocurrir entre dos personas cualesquiera sin importar el género, y puede venir de un compañero, un supervisor o un cliente.</p><p>Si sufre o presencia acoso sexual, repórtelo de inmediato. Puede usar cualquiera de estos canales, y no tiene que acudir a su supervisor directo si esa es la persona involucrada:</p><ul><li>Su supervisor o jefe de cuadrilla</li><li>La oficina o RR. HH.</li><li>El dueño directamente</li></ul><p>Nunca tomamos represalias por un reporte de buena fe ni por participar en una investigación. Investigamos de inmediato y con justicia, lo mantenemos tan confidencial como podemos, y quien viole esta política enfrenta medidas disciplinarias hasta el despido. También puede presentar una queja ante el Departamento de Derechos Civiles de California (calcivilrights.ca.gov) o la EEOC (eeoc.gov), y hay plazos, así que no espere.</p><p class=\"ca-note\"><b>Nota de California:</b> California exige capacitación de prevención del acoso para supervisores y no supervisores en empleadores con cinco o más empleados, y los empleadores de limpieza deben brindar capacitación presencial cada dos años a través de una organización calificada por el estado (Código Laboral 1429.5).</p>"}, "At-Will Employment": {"name": "Empleo a voluntad", "summary": "El empleo es a voluntad: cualquiera de las partes puede terminarlo en cualquier momento. Nada aqu\u00ed es un contrato.", "body": "<p>El empleo con M &amp; M Solutions es a voluntad. Usted o la empresa pueden terminar la relaci\u00f3n laboral en cualquier momento, con o sin causa y con o sin aviso.</p><p>Ning\u00fan supervisor puede cambiar esto salvo el due\u00f1o, por escrito y firmado. Nada en estas pol\u00edticas crea un contrato ni garantiza empleo por un per\u00edodo determinado.</p>"}, "Equal Employment Opportunity": {"name": "Igualdad de oportunidades de empleo", "summary": "Basamos cada decisi\u00f3n de empleo en las cualificaciones, nunca en una caracter\u00edstica protegida.", "body": "<p>Somos un empleador que ofrece igualdad de oportunidades. Cada decisi\u00f3n de empleo (contrataci\u00f3n, asignaciones, salario, capacitaci\u00f3n, ascenso y despido) se basa en las cualificaciones y el desempe\u00f1o, nunca en una caracter\u00edstica protegida.</p><p class=\"ca-note\"><b>Nota de California:</b> Las caracter\u00edsticas protegidas incluyen raza, color, religi\u00f3n, sexo, g\u00e9nero, identidad y expresi\u00f3n de g\u00e9nero, orientaci\u00f3n sexual, embarazo, origen nacional, ascendencia, edad (40+), discapacidad, condici\u00f3n m\u00e9dica, informaci\u00f3n gen\u00e9tica, estado civil y condici\u00f3n militar o de veterano.</p>"}, "Anti-Harassment, Discrimination & Retaliation": {"name": "Anti-acoso, discriminaci\u00f3n y represalias", "summary": "Cero tolerancia, los canales para reportar de forma segura y sin represalias.", "body": "<p>No toleramos el acoso, la discriminaci\u00f3n ni las represalias de ning\u00fan tipo. Esto incluye comentarios, insultos, bromas, im\u00e1genes o insinuaciones no deseadas basadas en cualquier caracter\u00edstica protegida, y cualquier forma de acoso sexual.</p><p>Si usted sufre o presencia esto, rep\u00f3rtelo a su supervisor, a la oficina o al due\u00f1o. Investigamos de inmediato, lo mantenemos tan confidencial como podemos y nunca tomamos represalias contra quien reporta de buena fe.</p><p class=\"ca-note\"><b>Nota de California:</b> Los empleadores de limpieza deben brindar capacitaci\u00f3n presencial de prevenci\u00f3n del acoso cada dos a\u00f1os a trav\u00e9s de una organizaci\u00f3n calificada por el estado, adem\u00e1s de la capacitaci\u00f3n general exigida a empleadores con cinco o m\u00e1s empleados.</p>"}, "Code of Conduct & Professionalism": {"name": "C\u00f3digo de conducta y profesionalismo", "summary": "Las normas de comportamiento que se esperan en el trabajo y en los sitios de los clientes.", "body": "<p>Esperamos que cada miembro del equipo sea confiable, honesto y respetuoso. Llegue a tiempo y listo para trabajar, trate a clientes y compa\u00f1eros con cortes\u00eda, siga instrucciones razonables, cuide la propiedad del cliente y nunca est\u00e9 bajo la influencia de alcohol o drogas en horario de trabajo.</p>"}, "Confidentiality & Trade Secrets": {"name": "Confidencialidad y secretos comerciales", "summary": "Mantener privados los listados de clientes, c\u00f3digos, llaves y horarios, durante y despu\u00e9s del empleo.", "body": "<p>Durante su trabajo conoce informaci\u00f3n privada de nuestros clientes y del negocio: listados de clientes, horarios, c\u00f3digos de alarma, llaves y precios. Mantenga todo ello confidencial, durante y despu\u00e9s de su empleo.</p><p>Firmar\u00e1 un acuerdo de confidencialidad aparte, que sigue vigente despu\u00e9s de que se vaya.</p>"}, "Paydays & Pay Periods": {"name": "D\u00edas de pago y per\u00edodos de pago", "summary": "Pago semanal, d\u00edas de pago, comprobantes de salario y a qui\u00e9n consultar sobre su cheque.", "body": "<p>Pagamos semanalmente. Recibe un comprobante de salario detallado en cada per\u00edodo que muestra sus horas, tarifa, pago bruto y neto, y deducciones. Rev\u00edselo y avise a la oficina de inmediato si algo se ve mal.</p><p class=\"ca-note\"><b>Nota de California:</b> California exige d\u00edas de pago regulares y comprobantes de salario detallados con datos espec\u00edficos, y los salarios deben pagarse dentro de los plazos establecidos para su frecuencia de pago.</p>"}, "Timekeeping & No Off-the-Clock Work": {"name": "Registro de horas y nada de trabajo fuera de horario", "summary": "Registre todo su tiempo con exactitud y nunca trabaje fuera de horario.", "body": "<p>Registre todo su tiempo con exactitud. Marque su entrada cuando empiece y su salida cuando termine, usando el reloj con c\u00f3digo QR en cada sitio. Nunca trabaje fuera de horario. Si realiza cualquier trabajo, debe quedar registrado para que se le pague.</p><p>Falsificar registros de tiempo, los suyos o los de otra persona, es una falta grave.</p>"}, "Meal & Rest Breaks": {"name": "Descansos para comer y descansos", "summary": "Reglas de California para descansos de comida y descansos, y la compensaci\u00f3n por un descanso perdido.", "body": "<p>Tiene derecho a descansos para comer y descansos, y esperamos que los tome.</p><ul><li>Un descanso de comida de 30 minutos, no pagado y sin obligaciones, debe comenzar antes del final de su quinta hora de trabajo. Un segundo descanso de comida aplica a turnos de m\u00e1s de 10 horas.</li><li>Se otorga un descanso pagado de 10 minutos por cada cuatro horas trabajadas.</li><li>Si no puede tomar un descanso, avise a su supervisor para que paguemos la compensaci\u00f3n de una hora exigida y ajustemos el horario.</li></ul>"}, "Overtime": {"name": "Horas extra", "summary": "C\u00f3mo se pagan en California las horas extra diarias y semanales y el tiempo doble.", "body": "<p>A los empleados no exentos se les pagan horas extra seg\u00fan las reglas de California:</p><ul><li>1.5x su tarifa regular por horas de m\u00e1s de 8 en un d\u00eda laboral y de m\u00e1s de 40 en una semana laboral</li><li>2x por horas de m\u00e1s de 12 en un d\u00eda laboral</li><li>En el 7.\u00ba d\u00eda consecutivo de una semana laboral, 1.5x las primeras 8 horas y 2x despu\u00e9s de 8</li></ul><p>Las horas extra deben aprobarse por adelantado, pero si las trabaja, se le pagan.</p>"}, "Travel Time & Reporting Time": {"name": "Tiempo de viaje y tiempo de presentaci\u00f3n", "summary": "Qu\u00e9 viajes entre la oficina, los sitios y las recogidas se pagan, y el pago por presentarse.", "body": "<p>El tiempo que pasa viajando por trabajo durante el d\u00eda se paga: de la oficina a un sitio, entre sitios y en cualquier recogida requerida. Su trayecto normal de casa al primer sitio y de regreso generalmente no se paga.</p><p class=\"ca-note\"><b>Nota de California:</b> Si se presenta a trabajar seg\u00fan lo programado pero lo env\u00edan a casa temprano, las reglas de pago por presentarse pueden darle derecho a pago adicional. Consulte a la oficina si esto ocurre.</p>"}, "Expense & Mileage Reimbursement": {"name": "Reembolso de gastos y millaje", "summary": "C\u00f3mo obtener reembolso por el millaje requerido y los gastos de trabajo (C\u00f3digo Laboral 2802).", "body": "<p>Reembolsamos los gastos necesarios en que incurre para hacer su trabajo, como el millaje por conducir requerido entre sitios y los materiales que le pedimos comprar. Presente los gastos a la oficina con recibos o un registro de millaje.</p><p class=\"ca-note\"><b>Nota de California:</b> El C\u00f3digo Laboral 2802 exige el reembolso de todos los gastos comerciales necesarios.</p>"}, "Paid Sick Leave": {"name": "Licencia por enfermedad pagada", "summary": "Licencia por enfermedad pagada de California: 40 horas al a\u00f1o y c\u00f3mo usarla.", "body": "<p>Usted recibe 40 horas (5 d\u00edas) de licencia por enfermedad pagada al a\u00f1o, entregadas por adelantado. Los nuevos empleados pueden usarla despu\u00e9s de 90 d\u00edas en el trabajo.</p><p>\u00dasela para su enfermedad o la de un familiar, atenci\u00f3n preventiva o ciertos motivos de seguridad. Solic\u00edtela en la pesta\u00f1a de Tiempo libre y avise con la mayor anticipaci\u00f3n posible. Nunca tomamos represalias por usar la licencia por enfermedad.</p><p class=\"ca-note\"><b>Nota de California:</b> El m\u00ednimo estatal es 40 horas o 5 d\u00edas al a\u00f1o, lo que sea mayor. Algunas ciudades exigen m\u00e1s, as\u00ed que confirme cualquier ordenanza local que aplique.</p>"}, "Vacation / PTO": {"name": "Vacaciones / PTO", "summary": "C\u00f3mo se acumula el tiempo libre pagado y c\u00f3mo solicitarlo. En California, las vacaciones acumuladas son salario.", "body": "<p>Si ofrecemos vacaciones pagadas o PTO, se acumulan mientras trabaja y las solicita en la pesta\u00f1a de Tiempo libre. Le informaremos su tasa de acumulaci\u00f3n cuando aplique a usted.</p><p class=\"ca-note\"><b>Nota de California:</b> Las vacaciones acumuladas son salario devengado. No se permite la p\u00e9rdida de tipo '\u00faselo o pi\u00e9rdalo', aunque s\u00ed un tope razonable, y las vacaciones acumuladas no usadas se pagan al terminar el empleo.</p>"}, "Protected Leaves of Absence": {"name": "Permisos protegidos", "summary": "Permisos protegidos por ley: CFRA, discapacidad por embarazo, jurado, servicio militar y m\u00e1s.", "body": "<p>Puede ser elegible para permisos con protecci\u00f3n del empleo por motivos familiares y m\u00e9dicos (CFRA), discapacidad por embarazo, deber de jurado, votaci\u00f3n, servicio militar y m\u00e1s. Si necesita tiempo libre por uno de estos, comun\u00edquese con la oficina con anticipaci\u00f3n para explicarle sus derechos y el proceso.</p>"}, "Lactation Accommodation": {"name": "Acomodaci\u00f3n para lactancia", "summary": "Tiempo de descanso y un espacio privado para extraer leche materna, como exige la ley de California.", "body": "<p>Ofrecemos tiempo de descanso razonable y un espacio privado, que no sea un ba\u00f1o, para extraer leche materna, como exige la ley de California. Avise a la oficina y lo organizaremos.</p>"}, "Injury & Illness Prevention Program (IIPP)": {"name": "Programa de Prevenci\u00f3n de Lesiones y Enfermedades (IIPP)", "summary": "Nuestro programa de seguridad escrito de Cal/OSHA y su papel en \u00e9l.", "body": "<p>Mantenemos un Programa escrito de Prevenci\u00f3n de Lesiones y Enfermedades, como exige Cal/OSHA. Siga las pr\u00e1cticas de trabajo seguras, use el equipo de protecci\u00f3n provisto y reporte condiciones inseguras. Pida una copia a la oficina.</p>"}, "Workers' Compensation": {"name": "Compensaci\u00f3n al trabajador", "summary": "Cobertura para lesiones de trabajo y c\u00f3mo reportarlas el mismo d\u00eda.", "body": "<p>Contamos con seguro de compensaci\u00f3n al trabajador. Si se lesiona o enferma a causa de su trabajo, por leve que sea, rep\u00f3rtelo a su supervisor el mismo d\u00eda para que reciba atenci\u00f3n e iniciemos un reclamo. Nunca tomamos represalias por reportar una lesi\u00f3n de trabajo.</p>"}, "Chemical Safety & SDS": {"name": "Seguridad qu\u00edmica y SDS", "summary": "Manejo seguro de productos qu\u00edmicos de limpieza, acceso a las SDS, nunca mezclar y EPP.", "body": "<p>Los productos qu\u00edmicos de limpieza pueden ser peligrosos si se manejan mal.</p><ul><li>Lea la etiqueta y la Hoja de Datos de Seguridad (SDS) antes de usar un producto.</li><li>Nunca mezcle productos. El cloro y el amon\u00edaco juntos crean un gas t\u00f3xico.</li><li>Diluya seg\u00fan las indicaciones, trabaje en \u00e1reas ventiladas y use los guantes y la protecci\u00f3n para los ojos provistos.</li><li>Almacene y etiquete los productos correctamente, y reporte cualquier derrame o reacci\u00f3n de inmediato.</li></ul>"}, "Drug & Alcohol-Free Workplace": {"name": "Lugar de trabajo libre de drogas y alcohol", "summary": "Nada de estar bajo los efectos en el trabajo ni en los sitios de los clientes.", "body": "<p>Estar bajo los efectos pone en riesgo a usted, a sus compa\u00f1eros y a los clientes. No puede poseer, usar ni estar bajo los efectos de alcohol o drogas ilegales mientras trabaja o en el sitio de un cliente. Las violaciones pueden llevar a medidas disciplinarias, incluido el despido.</p>"}, "Dress Code & Uniform": {"name": "C\u00f3digo de vestimenta y uniforme", "summary": "Uniforme limpio, identificaci\u00f3n visible y calzado seguro en cada trabajo.", "body": "<p>Use su uniforme limpio de la empresa y su identificaci\u00f3n visible en cada trabajo, con zapatos cerrados y antideslizantes. Usted representa a M &amp; M Solutions en cada sitio, as\u00ed que una apariencia pulcra y profesional importa.</p>"}, "Company Vehicle & Safe Driving": {"name": "Veh\u00edculo de la empresa y conducci\u00f3n segura", "summary": "Reglas para conducir un veh\u00edculo de la empresa o conducir por trabajo.", "body": "<p>Si conduce un veh\u00edculo de la empresa o conduce por trabajo, tenga una licencia y un seguro v\u00e1lidos, opere el veh\u00edculo de forma segura y legal, nunca conduzca bajo los efectos y reporte cualquier accidente o da\u00f1o de inmediato.</p>"}, "Cell Phone & Distracted Driving": {"name": "Tel\u00e9fono celular y conducci\u00f3n distra\u00edda", "summary": "Solo manos libres al conducir, como exige la ley de California.", "body": "<p>No use un tel\u00e9fono en la mano mientras conduce. La ley de California exige el uso de manos libres. Haga llamadas y mensajes antes de arrancar o despu\u00e9s de estacionar.</p>"}, "Vehicle & Traffic Citations": {"name": "Veh\u00edculo y citaciones de tr\u00e1nsito", "summary": "Qui\u00e9n paga las multas de tr\u00e1nsito, estacionamiento y peaje durante el trabajo, y c\u00f3mo reportarlas.", "body": "<p>Conducir de forma segura y legal es parte de su trabajo. Ning\u00fan horario, ruta o pedido de un cliente le exige exceder la velocidad, usar el tel\u00e9fono en la mano o estacionar ilegalmente. Si no encuentra estacionamiento legal en un sitio, comun\u00edquese con su supervisor antes de estacionar ilegalmente.</p><ul><li><b>Las infracciones en movimiento son suyas.</b> Una infracci\u00f3n en movimiento emitida a usted durante horas de trabajo, como exceso de velocidad o uso del tel\u00e9fono, es su multa personal, ya sea en su propio veh\u00edculo o en un veh\u00edculo de la empresa. La empresa no la pagar\u00e1 ni la reembolsar\u00e1.</li><li><b>Citaciones de estacionamiento y peaje.</b> Una citaci\u00f3n de estacionamiento o peaje es su responsabilidad si hab\u00eda opciones legales disponibles. Si cree que la empresa indic\u00f3 d\u00f3nde estacionar o la asignaci\u00f3n no le dej\u00f3 opci\u00f3n legal, rep\u00f3rtela dentro de 24 horas y la oficina revisar\u00e1 si la empresa la cubre. Los costos normales de estacionamiento legal, como parqu\u00edmetros y lotes, se reembolsan por el proceso normal de gastos.</li><li><b>Reporte toda citaci\u00f3n en un veh\u00edculo de la empresa.</b> Rep\u00f3rtela a su supervisor dentro de 24 horas y entregue la boleta. Las citaciones no reportadas generan recargos y retenciones del DMV contra la empresa.</li><li><b>Sin deducciones del cheque.</b> Nunca deducimos una multa o citaci\u00f3n de su salario. Si la empresa paga una citaci\u00f3n que era su responsabilidad, cualquier reembolso es voluntario y se maneja fuera de la n\u00f3mina.</li><li><b>Su tiempo sigue pagado.</b> Si la polic\u00eda lo detiene o est\u00e1 atendiendo una citaci\u00f3n durante su turno, ese tiempo sigue en el reloj.</li></ul><p>Las infracciones en movimiento durante horas de trabajo se tratan como un asunto de seguridad y pueden llevar a medidas correctivas, cambios en las asignaciones de manejo o el despido por infracciones repetidas o graves. La empresa puede revisar los registros del DMV de los empleados que conducen por trabajo.</p><p class=\"ca-note\"><b>Nota de California:</b> Los C\u00f3digos Laborales 221 y 224 proh\u00edben deducir multas del salario, el C\u00f3digo Laboral 2802 regula qu\u00e9 gastos de trabajo se reembolsan, y el tiempo de una parada de tr\u00e1nsito durante su turno son horas trabajadas seg\u00fan la Orden Salarial 5.</p>"}, "Social Media": {"name": "Redes sociales", "summary": "Mantenga la informaci\u00f3n de clientes y confidencial fuera de las redes sociales.", "body": "<p>Fuera del horario, sus redes sociales son suyas. Nunca publique informaci\u00f3n de clientes, fotos de la propiedad del cliente, horarios ni nada confidencial, y no hable en nombre de la empresa sin permiso. El acoso en l\u00ednea se trata igual que el acoso en el trabajo.</p>"}, "Progressive Discipline": {"name": "Disciplina progresiva", "summary": "El proceso justo, paso a paso, cuando la conducta o el desempe\u00f1o no cumplen.", "body": "<p>Cuando la conducta o el desempe\u00f1o no cumplen, en general usamos un enfoque justo, paso a paso: un recordatorio, una advertencia por escrito, una advertencia final y luego el despido. Una falta grave puede saltar pasos y llevar al despido inmediato. Esto no cambia la naturaleza a voluntad del empleo.</p>"}, "Complaint / Grievance Procedure": {"name": "Procedimiento de quejas", "summary": "C\u00f3mo plantear una inquietud y qu\u00e9 ocurre despu\u00e9s, sin represalias.", "body": "<p>Si tiene una inquietud o queja, plant\u00e9ela a su supervisor, a la oficina o al due\u00f1o, con quien se sienta c\u00f3modo. La revisamos y nunca tomamos represalias por plantearla de buena fe.</p>"}, "Personnel Records Access": {"name": "Acceso a los registros de personal", "summary": "Su derecho a revisar y copiar sus registros de personal y de pago.", "body": "<p>Tiene derecho a revisar y copiar sus registros de personal y los relacionados con su pago. P\u00eddalo a la oficina por escrito y lo organizaremos dentro del plazo que exige la ley.</p><p class=\"ca-note\"><b>Nota de California:</b> El C\u00f3digo Laboral 1198.5 y 226 dan a los empleados el derecho a revisar los registros de personal y de n\u00f3mina.</p>"}, "Background Checks & Fair Chance": {"name": "Verificaci\u00f3n de antecedentes y Fair Chance", "summary": "C\u00f3mo manejamos las verificaciones de antecedentes seg\u00fan la Ley Fair Chance y la FCRA.", "body": "<p>Si realizamos una verificaci\u00f3n de antecedentes, seguimos la Ley federal de Informe Justo de Cr\u00e9dito (FCRA) y la Ley Fair Chance de California. No preguntamos sobre antecedentes penales hasta despu\u00e9s de una oferta de trabajo condicional, y seguimos el proceso requerido antes de basarnos en cualquier registro.</p>"}, "Resignation & Termination": {"name": "Renuncia y terminaci\u00f3n", "summary": "Aviso, devoluci\u00f3n de propiedad y los plazos de pago final de California.", "body": "<p>Si decide irse, agradecemos el mayor aviso posible. Al terminar, devuelva toda la propiedad de la empresa: llaves, uniformes y equipo. Su pago final, incluidas las vacaciones acumuladas no usadas, se entrega dentro de los plazos que exige la ley de California.</p><p class=\"ca-note\"><b>Nota de California:</b> Plazos del pago final: si lo despedimos, de inmediato; si renuncia sin aviso, dentro de 72 horas; si da al menos 72 horas de aviso, en su \u00faltimo d\u00eda.</p>"}, "Janitorial Registration (AB 1978)": {"name": "Registro de limpieza (AB 1978)", "summary": "Estamos registrados como empleador de servicios de propiedad ante el Comisionado Laboral de California.", "body": "<p>Seg\u00fan la Ley de Protecci\u00f3n de Trabajadores de Servicios de Propiedad (AB 1978), los empleadores de limpieza de California se registran cada a\u00f1o ante el Comisionado Laboral y mantienen registros del trabajo realizado. M &amp; M Solutions mantiene este registro y cumple con la ley.</p><p class=\"ca-note\"><b>Nota de California:</b> El registro se renueva cada a\u00f1o ante la Divisi\u00f3n de Cumplimiento de Normas Laborales, y el personal recibe la capacitaci\u00f3n requerida de prevenci\u00f3n de violencia sexual y acoso.</p>"}, "Required Notices & Training": {"name": "Avisos y capacitaci\u00f3n requeridos", "summary": "Los avisos y la capacitaci\u00f3n que la ley exige que le demos.", "body": "<p>Al contratarlo y durante su empleo le entregamos los avisos que California exige: el aviso salarial (C\u00f3digo Laboral 2810.5), informaci\u00f3n sobre licencia por enfermedad pagada, informaci\u00f3n sobre compensaci\u00f3n al trabajador y los folletos sobre acoso y derechos por embarazo. Tambi\u00e9n brindamos la capacitaci\u00f3n de prevenci\u00f3n del acoso requerida. Pregunte a la oficina si no ha recibido alguno de estos.</p>"}};

function onbMigrate(o){
  if(!o||!Array.isArray(o.tasks)||!o.tasks.length) return false;
  const cur=newTasks(onbKind(o.tasks));
  const curKeys=cur.map(t=>t.key).join(","), oldKeys=o.tasks.map(t=>t.key).join(",");
  if(curKeys===oldKeys){
    let changed=false;
    o.tasks.forEach((t,i)=>{ const c=cur[i]; if(t.label!==c.label||(t.form||null)!==(c.form||null)||(t.link||null)!==(c.link||null)){ t.label=c.label; t.form=c.form||null; t.link=c.link||null; changed=true; } });
    return changed;
  }
  const old=new Map(o.tasks.map(t=>[t.key,t]));
  o.tasks=cur.map(t=>{ const prev=old.get(t.key); return prev?Object.assign(t,{done:!!prev.done,ts:prev.ts||null,sig:prev.sig||null}):t; });
  return true;
}

function onbReceipt(i){
  const o=(state.rec.onbs||[])[i]; if(!o)return;
  const tasks=o.tasks||[]; const kind=onbKind(tasks)==="remote"?"Remote contractor":"US crew (California W-2)";
  const lines=["M & M Solutions LLC","Onboarding record and acknowledgment receipt","", "Name: "+(o.name||""),"Role: "+(o.role||""),"Checklist: "+kind,"Code: "+(o.code||""),"Generated: "+new Date().toLocaleString(),""];
  let g="";
  tasks.forEach(t=>{ if(t.group!==g){ g=t.group; lines.push(""); lines.push(g.toUpperCase()); }
    let l=(t.done?"[x] ":"[ ] ")+t.label;
    if(t.sig) l+="  |  Signed by "+t.sig+(t.ts?" on "+new Date(t.ts).toLocaleString():"");
    else if(t.done&&t.ts) l+="  |  Completed "+new Date(t.ts).toLocaleString();
    lines.push(l); });
  lines.push(""); lines.push("This receipt was generated from the M & M Solutions HR Hub. Signatures were typed by the new hire on their private onboarding page and are stored with a timestamp.");
  const blob=new Blob([lines.join("\n")],{type:"text/plain"});
  const aEl=document.createElement("a"); aEl.href=URL.createObjectURL(blob);
  aEl.download="onboarding-"+((o.name||"hire").replace(/[^a-z0-9]+/gi,"-").toLowerCase())+"-acknowledgments.txt";
  document.body.appendChild(aEl); aEl.click(); document.body.removeChild(aEl); URL.revokeObjectURL(aEl.href);
  toast("Receipt downloaded");
}

  await onbPersist();

const DOC_KEYS=["i9","w4w9","de4","wage","dd","offer","app","handbook","confid","harass"];
function docPct(docs){ return Math.round(DOC_KEYS.filter(k=>docs[k]===true).length/DOC_KEYS.length*100); }
async function onbSyncProfile(id,data){
  try{
    const name=((data["Full legal name"]||data["Your name"]||"").trim())||(((state.onboardRec||{}).name)||"").trim();
    if(!name) return;
    const profs=await DB.profiles();
    const p=profs.find(x=>((x.name||"").trim().toLowerCase())===name.toLowerCase());
    const rec=state.kiosk?(state.onboardRec||null):null;
    const kind=rec?onbKind(rec.tasks):null;
    const base=kind?{name,status:"Active","class":kind==="remote"?"1099":"W-2",role:(rec&&rec.role)||(kind==="remote"?"Remote Contractor":"Cleaner"),team:kind==="remote"?"ph":"ca",active:true,training:{},sick:{}}:null;
    if(id==="ica_sign"||id==="confid_sign"){
      const dk=id==="ica_sign"?"offer":"confid";
      const docs=Object.assign({},(p&&p.docs)||{}); docs[dk]=true; docs.pct=docPct(docs);
      if(p) await DB.updateProfile(p.id,{docs});
      else if(base) await DB.addProfile(Object.assign(base,{address:data["Address"]||null,docs}));
      return;
    }
    const emg=[data["Emergency contact name"],data["Relationship to you"],data["Emergency contact phone"]].filter(Boolean).join(", ");
    const addr=[data["Home address"],data["City and country"]].filter(Boolean).join(", ");
    const patch={};
    if(data["Phone"]) patch.phone=data["Phone"];
    if(addr) patch.address=addr;
    if(emg) patch.emergency_contact=emg;
    if(p){ if(Object.keys(patch).length) await DB.updateProfile(p.id,patch); }
    else if(base) await DB.addProfile(Object.assign(base,{docs:{pct:0}},patch));
  }catch(e){ console.error("profile sync",e); }
}

function monthDay(m,dd){ return new Date(2000,m-1,dd).toLocaleDateString(undefined,{month:"long",day:"numeric"}); }
function daysUntilMD(m,dd){ const t=new Date();t.setHours(0,0,0,0); let d=new Date(t.getFullYear(),m-1,dd); if(d<t)d=new Date(t.getFullYear()+1,m-1,dd); return Math.round((d-t)/86400000); }

function renderCelebrations(kind){
  const isB=kind==="bday"; const eye=isB?t("Birthdays"):t("Work anniversaries");
  const items=[];
  (EMP||[]).forEach(e=>{
    if(isB){ if(!e.bday)return; const p=(""+e.bday).split("-").map(Number); const m=p[0],dd=p[1]; if(!m||!dd)return; items.push({name:e.name,days:daysUntilMD(m,dd),label:monthDay(m,dd)}); }
    else { if(!e.hire_date)return; const hd=new Date(e.hire_date+"T00:00:00"); if(isNaN(hd))return; const m=hd.getMonth()+1,dd=hd.getDate(); const t0=new Date();t0.setHours(0,0,0,0); let a=new Date(t0.getFullYear(),m-1,dd); if(a<t0)a=new Date(t0.getFullYear()+1,m-1,dd); items.push({name:e.name,days:daysUntilMD(m,dd),label:monthDay(m,dd),years:a.getFullYear()-hd.getFullYear()}); }
  });
  const up=items.filter(x=>x.days<=60).sort((a,b)=>a.days-b.days);
  const when=x=>x.days===0?t("Today"):x.days===1?t("Tomorrow"):`${t("in")} ${x.days} ${t("days")}`;
  const row=x=>`<div class="cel-row"><span class="dir-ava">${esc(dirInitials(x.name))}</span><span class="dir-main"><span class="dir-name">${esc(x.name)}</span><span class="dir-sub">${x.label}${!isB&&x.years?` · ${x.years} ${x.years===1?t("year"):t("years")}`:""}</span></span><span class="cel-when">${when(x)}</span></div>`;
  const body=up.length?up.map(row).join(""):`<div class="empty"><i class="ti ${isB?"ti-cake":"ti-award"}"></i><p>${isB?t("No birthdays in the next 60 days."):t("No anniversaries in the next 60 days.")}</p></div>`;
  $("#view").innerHTML=pageHead(t("Home"),eye,t("Coming up in the next 60 days."))+`<div class="cel-list">${body}</div>`;
}

async function formSubmit(id){
  const d=FORMS[id]; if(!d)return;
  const data={}; let missing=false;
  d.fields.forEach(f=>{ const el=$("#f_"+f.k); const v=el?el.value.trim():""; data[f.label]=v; if(f.req&&!v)missing=true; });
  if(missing){ toast(t("Please fill the required fields")); return; }
  const nf=d.fields.find(f=>/name|employee|reporter/i.test(f.k));
  const who=nf?(data[nf.label]||""):"";
  const rec={type:id,title:d.title,employee_name:who,submitted_by:who||"Staff",data,status:"pending",created_at:new Date().toISOString()};
  try{
    await DB.addSubmission(rec);

    if(CONFIG.notifyWebhook){ try{ fetch(CONFIG.notifyWebhook,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(rec)}); }catch(e){} }
    toast(t("Sent to HR"));
    if(state._formPanel){ state._formPanel=false; closePanel(); if(state.kiosk&&state.module==="onboard") renderOnboard(); }
    else goModule(state.kiosk?"onboard":(id==="incident"?"toolkit":"documents"));
  }catch(e){ toast(t("Could not send")); }
}

function parseCSV(text){const rows=[];let row=[],cur="",q=false;for(let i=0;i<text.length;i++){const c=text[i],n=text[i+1];if(q){if(c==='"'&&n==='"'){cur+='"';i++;}else if(c==='"')q=false;else cur+=c;}else{if(c==='"')q=true;else if(c===','){row.push(cur);cur="";}else if(c==='\r'){}else if(c==='\n'){row.push(cur);rows.push(row);row=[];cur="";}else cur+=c;}}if(cur.length||row.length){row.push(cur);rows.push(row);}return rows.filter(r=>r.some(c=>c.trim()!==""));}
function rowsToPolicies(rows){if(!rows.length)return[];const h=rows[0].map(x=>x.trim().toLowerCase());const idx=(...n)=>{for(const m of n){const i=h.indexOf(m);if(i>=0)return i;}return -1;};const ci={category:idx("category","group"),name:idx("policy","name","title"),summary:idx("summary","description"),link:idx("link","url","doc"),status:idx("status"),owner:idx("owner"),updated:idx("updated","last reviewed","reviewed"),tags:idx("tags"),required:idx("required","mandatory")};const out=[];for(let i=1;i<rows.length;i++){const r=rows[i],g=k=>ci[k]>=0?(r[ci[k]]||"").trim():"";const name=g("name");if(!name)continue;const rq=g("required").toLowerCase();out.push({category:g("category")||"General",name,summary:g("summary"),link:g("link"),status:g("status")||"Active",owner:g("owner"),updated:g("updated"),tags:g("tags")?g("tags").split(",").map(t=>t.trim()).filter(Boolean):[],required:["yes","true","y","1"].includes(rq)});}return out;}
function polFromRows(rows){POLICIES=rows.map(r=>({category:r[0],name:r[1],summary:r[2],link:r[3],status:r[4],owner:r[5],updated:r[6],tags:r[7]?r[7].split(",").map(t=>t.trim()):[],required:(r[8]||"").toLowerCase()==="yes",body:r[9]||""}));return POLICIES;}
function polIcon(name){const k=name.toLowerCase();for(const key in CAT_ICONS){if(k.includes(key))return CAT_ICONS[key];}return "ti-folder";}
function buildCats(){const m=new Map();POLICIES.forEach(p=>{if(!m.has(p.category))m.set(p.category,[]);m.get(p.category).push(p);});CATS=[...m.keys()].map((name,i)=>({name,color:CAT_COLORS[i%CAT_COLORS.length],icon:polIcon(name),items:m.get(name)}));POLICIES.forEach(p=>{const c=CATS.find(c=>c.name===p.category);p._color=c?c.color:"#999";});}

function celebInline(){
  const anniv=[],bdays=[];
  (EMP||[]).forEach(e=>{
    if(e.hire_date){const hd=new Date(e.hire_date+"T00:00:00");if(!isNaN(hd)){const m=hd.getMonth()+1,dd=hd.getDate();const t0=new Date();t0.setHours(0,0,0,0);let a=new Date(t0.getFullYear(),m-1,dd);if(a<t0)a=new Date(t0.getFullYear()+1,m-1,dd);anniv.push({name:e.name,days:daysUntilMD(m,dd),years:a.getFullYear()-hd.getFullYear()});}}
    if(e.bday){const p=(""+e.bday).split("-").map(Number);if(p[0]&&p[1])bdays.push({name:e.name,days:daysUntilMD(p[0],p[1]),label:monthDay(p[0],p[1])});}
  });
  const upA=anniv.filter(x=>x.days<=60).sort((a,b)=>a.days-b.days).slice(0,5);
  const upB=bdays.filter(x=>x.days<=60).sort((a,b)=>a.days-b.days).slice(0,5);
  const when=x=>x.days===0?t("Today"):x.days===1?t("Tomorrow"):`${t("in")} ${x.days} ${t("days")}`;
  const rowA=x=>`<div class="cel-line"><span class="cel-name">${esc(x.name)}</span><span class="cel-meta">${x.years?x.years+" "+(x.years===1?t("year"):t("years"))+" \u00b7 ":""}${when(x)}</span></div>`;
  const rowB=x=>`<div class="cel-line"><span class="cel-name">${esc(x.name)}</span><span class="cel-meta">${x.label} \u00b7 ${when(x)}</span></div>`;
  const none=`<div class="cel-empty">${t("None in the next 60 days.")}</div>`;
  const colA=`<div class="cel-col"><div class="cel-h">\u{1F389} ${t('Work anniversaries')}</div>${upA.length?upA.map(rowA).join(""):none}</div>`;
  const colB=`<div class="cel-col"><div class="cel-h">\u{1F382} ${t('Birthdays')}</div>${upB.length?upB.map(rowB).join(""):none}</div>`;
  return `<div class="section-label" style="margin-top:22px">${t('Coming up')}</div><div class="cel-wrap">${colA}${colB}</div>`;
}
